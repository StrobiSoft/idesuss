<!-- Sarah Connor Optimized Edition: Design + Cobalt Engine -->
<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Idesüss™ — Főoldal</title>
  <style>
    /* AZ EREDETI 1700 SOROS DESIGN ÖSSZES STÍLUSA (Kivonat a legfontosabbakból) */
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --text: #17324d;
      --muted: #5e748d;
      --primary: #0d5bd7;
      --primary-soft: #e7f0ff;
      --shadow: 0 10px 28px rgba(22, 44, 77, 0.08);
      --radius: 18px;
      --hero-blue-1: #0f49d8;
      --hero-blue-2: #3b82f6;
      --hero-blue-3: #8fd2ff;
    }

    body {
      margin: 0;
      font-family: -apple-system, system-ui, sans-serif;
      background: radial-gradient(circle at top right, rgba(13, 91, 215, 0.08), transparent 22%), #f8fbff;
      color: var(--text);
    }

    /* GLASS BUTTONS LOGIC */
    .btn, .miniapp-btn {
      position: relative;
      padding: 14px 22px;
      border-radius: 18px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.4), inset 0 -3px 6px rgba(0,0,0,0.4), 0 8px 20px rgba(0,0,0,0.2);
    }

    .btn-primary { background: linear-gradient(135deg, var(--primary), #2f7cf0); color: white; }
    .btn-soft { background: var(--primary-soft); color: var(--primary); }

    .btn::before {
      content: ""; position: absolute; top: 4px; left: 8%; width: 84%; height: 40%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.6), rgba(255,255,255,0.05));
      border-radius: 50%; pointer-events: none;
    }

    /* CONTAINER & HERO */
    .container { width: min(1240px, calc(100% - 32px)); margin: 0 auto; }
    .hero-shell {
      position: relative; border-radius: 32px; padding: 40px; margin-top: 20px;
      background: linear-gradient(135deg, var(--hero-blue-1), var(--hero-blue-2), var(--hero-blue-3));
      box-shadow: 0 26px 60px rgba(13, 58, 140, 0.18);
      color: white;
    }

    .hero-miniapp {
      background: rgba(255,255,255,0.88); backdrop-filter: blur(14px);
      border-radius: 28px; padding: 26px; color: var(--text);
      max-width: 500px; margin: 20px auto;
    }

    .input {
      width: 100%; border: 1px solid #cfdbe8; border-radius: 16px;
      padding: 16px; font-size: 1rem; outline: none; margin: 15px 0;
      box-sizing: border-box;
    }

    /* VIDEÓ LEJÁTSZÓ KONTÉNER */
    #videoWrapper {
      display: none; margin-top: 20px; border-radius: 20px;
      overflow: hidden; background: #000; line-height: 0;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    }
    video { width: 100%; }
    
    .status-pill {
      font-size: 0.9rem; font-weight: bold; margin-top: 10px; text-align: center;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="hero-shell">
      <h1 style="margin:0; font-size: 2.8rem; letter-spacing: -2px;">Idesüss™</h1>
      <p style="opacity: 0.9;">Tiszta tartalom, zavaró tényezők nélkül.</p>

      <div class="hero-miniapp">
        <h3 style="margin:0">Nyilvános videó kicsomagolása</h3>
        <input id="videoUrl" class="input" type="url" placeholder="Illeszd be a linket (TikTok, YT, Insta)...">
        
        <div style="display: flex; gap: 10px;">
          <button id="pasteBtn" class="miniapp-btn btn-soft" style="flex:1">Beillesztés</button>
          <button id="openBtn" class="miniapp-btn btn-primary" style="flex:2">Megnyitás</button>
        </div>

        <div id="statusLabel" class="status-pill">Várjuk a linket...</div>

        <div id="videoWrapper">
          <video id="customPlayer" controls playsinline></video>
        </div>
      </div>
    </div>
  </div>

  <script>
    const videoInput = document.getElementById('videoUrl');
    const statusLabel = document.getElementById('statusLabel');
    const videoWrapper = document.getElementById('videoWrapper');
    const player = document.getElementById('customPlayer');

    // Beillesztés funkció
    document.getElementById('pasteBtn').onclick = async () => {
      try {
        const text = await navigator.clipboard.readText();
        videoInput.value = text;
        statusLabel.textContent = "Vágólap beillesztve.";
      } catch (err) {
        statusLabel.textContent = "Hiba a vágólap olvasásakor.";
      }
    };

    // A MOTOR: Cobalt API integráció
    async function extractVideo() {
      const url = videoInput.value.trim();
      if (!url) {
        statusLabel.textContent = "Kérlek, adj meg egy érvényes linket!";
        return;
      }

      statusLabel.textContent = "Kicsomagolás folyamatban...";
      statusLabel.style.color = "var(--primary)";

      try {
        const response = await fetch("https://api.cobalt.tools/api/json", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
          body: JSON.stringify({ url: url, videoQuality: "720" })
        });

        const data = await response.json();

        if (data.url) {
          player.src = data.url;
          videoWrapper.style.display = "block";
          player.play();
          statusLabel.textContent = "Sikeres kicsomagolás!";
          statusLabel.style.color = "#1f9d55";
        } else {
          throw new Error("Nincs közvetlen URL");
        }
      } catch (error) {
        statusLabel.textContent = "Közvetlen lejátszás nem sikerült. Megnyitás új lapon...";
        statusLabel.style.color = "#c53030";
        setTimeout(() => { window.open(url, "_blank"); }, 1500);
      }
    }

    document.getElementById('openBtn').onclick = extractVideo;
  </script>
</body>
</html>
