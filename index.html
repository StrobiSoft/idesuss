<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Idesüss App - Multi Stream</title>
  <style>
    :root {
      --bg1:#08111f; --bg2:#0f172a;
      --panel:rgba(255,255,255,0.05);
      --text:#eef4ff; --muted:#a4b1c8;
      --accent: linear-gradient(135deg, #38bdf8, #0ea5e9);
    }
    body {
      margin: 0; padding: calc(20px + env(safe-area-inset-top)) 15px;
      background: linear-gradient(155deg, var(--bg1), var(--bg2));
      color: var(--text); font-family: system-ui, sans-serif;
      display: flex; flex-direction: column; align-items: center; min-height: 100vh;
    }
    .app { width: 100%; max-width: 600px; }
    .card {
      background: var(--panel); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(10px);
    }
    textarea {
      width: 100%; min-height: 60px; background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
      color: #white; padding: 12px; font-size: 14px; outline: none; resize: none;
    }
    .btn-play {
      width: 100%; padding: 15px; margin-top: 10px; border: none;
      border-radius: 12px; background: var(--accent); color: white;
      font-weight: bold; font-size: 16px; cursor: pointer;
    }
    .player-container {
      width: 100%; aspect-ratio: 16/9; background: #000;
      border-radius: 16px; overflow: hidden; position: relative;
    }
    /* Álló videókhoz (TikTok/Reels/Shorts) automatikus igazítás */
    .player-container.portrait { aspect-ratio: 9/16; max-height: 70vh; margin: 0 auto; width: 80%; }
    
    iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    .status { text-align: center; font-size: 12px; color: var(--muted); margin-top: 8px; }
  </style>
</head>
<body>

  <div class="app">
    <div class="card">
      <h2 style="margin-top:0; font-size: 1.2rem; text-align:center;">Beillesztés</h2>
      <textarea id="videoURL" placeholder="YouTube, TikTok vagy FB Reels link..."></textarea>
      <button class="btn-play" onclick="handleSmartPlay()">Indítás</button>
      <div id="status" class="status">Várakozás linkre...</div>
    </div>

    <div id="playerCard" class="card" style="display:none;">
      <div id="playerWrapper" class="player-container">
        <div id="player"></div>
      </div>
    </div>
  </div>

  <script>
    function handleSmartPlay() {
      const url = document.getElementById("videoURL").value.trim();
      const playerDiv = document.getElementById("player");
      const wrapper = document.getElementById("playerWrapper");
      const card = document.getElementById("playerCard");
      const status = document.getElementById("status");

      if (!url) return;

      <script>
      function handleSmartPlay() {
  const urlInput = document.getElementById("videoURL").value.trim();
  const playerDiv = document.getElementById("player");
  const wrapper = document.getElementById("playerWrapper");
  const card = document.getElementById("playerCard");
  const status = document.getElementById("status");

  if (!urlInput) return;

  let embedUrl = "";
  let isPortrait = false;

  // 1. YouTube & Shorts (Marad a régi, mert jól működik)
  if (urlInput.includes("youtube.com") || urlInput.includes("youtu.be")) {
    let vId = "";
    if (urlInput.includes("shorts/")) {
      vId = urlInput.split("shorts/")[1].split(/[?&]/)[0];
      isPortrait = true;
    } else if (urlInput.includes("v=")) {
      vId = urlInput.split("v=")[1].split("&")[0];
    } else {
      vId = urlInput.split("/").pop().split(/[?&]/)[0];
    }
    embedUrl = `https://www.youtube.com/embed/${vId}?autoplay=1`;
  }

  // 2. TikTok (Marad a régi)
  else if (urlInput.includes("tiktok.com")) {
    const vId = urlInput.split("/video/")[1]?.split(/[?&]/)[0] || urlInput.split("/").pop().split(/[?&]/)[0];
    embedUrl = `https://www.tiktok.com/embed/v2/${vId}`;
    isPortrait = true;
  }

  // 3. JAVÍTOTT Facebook & Reels felismerő
  else if (urlInput.includes("facebook.com") || urlInput.includes("fb.watch") || urlInput.includes("fb.com")) {
    // Minden sallangot levágunk a link végéről, csak az alap URL kell
    let cleanFbUrl = urlInput.split(/[?&]mibextid/)[0]; // Eltávolítja a Facebook követő kódját
    
    // Facebook beágyazó plugin hívása
    embedUrl = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(cleanFbUrl)}&show_text=0&width=500&autoplay=1`;
    
    // Ha a linkben benne van a "reels", akkor álló formátumot kényszerítünk
    if (urlInput.includes("reels") || urlInput.includes("fb.watch")) {
      isPortrait = true;
    }
  }

  // Megjelenítés
  if (embedUrl) {
    card.style.display = "block";
    status.textContent = "Betöltés...";
    
    if (isPortrait) wrapper.classList.add("portrait");
    else wrapper.classList.remove("portrait");

    // iPhone-on az iframe-nek néha kell egy kis "erőszak", hogy betöltsön
    playerDiv.innerHTML = `<iframe 
        src="${embedUrl}" 
        scrolling="no" 
        frameborder="0" 
        allowfullscreen="true" 
        allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share">
    </iframe>`;
    
    setTimeout(() => { status.textContent = "Kész!"; }, 1500);
  } else {
    status.textContent = "Nem támogatott vagy hibás link.";
  }
}

  </script>
</body>
</html>
