<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Idesüss Video Viewer</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
padding:40px;
}

input{
width:60%;
padding:12px;
font-size:16px;
}

button{
padding:12px 20px;
font-size:16px;
margin-left:10px;
cursor:pointer;
}

iframe{
margin-top:30px;
width:80%;
height:480px;
border:none;
}
</style>

</head>

<body>

<h1>Idesüss Video Viewer</h1>
<p>Watch Without Login</p>

<input id="videolink" placeholder="Paste video link here">
<button onclick="play()">Play</button>

<br>

<iframe id="player"></iframe>

<script>
function detectPlatform(link){
if(link.includes("youtube.com") || link.includes("youtu.be")) return "YouTube";
if(link.includes("tiktok.com")) return "TikTok";
if(link.includes("instagram.com")) return "Instagram";
if(link.includes("facebook.com") || link.includes("fb.watch")) return "Facebook";
return "Unknown";
}

function convertYouTubeLink(link){
if(link.includes("youtube.com/watch?v=")){
let videoId = link.split("watch?v=")[1].split("&")[0];
return "https://www.youtube.com/embed/" + videoId;
}

if(link.includes("youtu.be/")){
let videoId = link.split("youtu.be/")[1].split("?")[0];
return "https://www.youtube.com/embed/" + videoId;
}

if(link.includes("youtube.com/embed/")){
return link;
}

return null;
}

function play(){
let link = document.getElementById("videolink").value.trim();
let platform = detectPlatform(link);
let player = document.getElementById("player");
let status = document.getElementById("status");

if(platform === "YouTube"){
let embedLink = convertYouTubeLink(link);
if(embedLink){
status.innerText = "Platform detected: YouTube";
player.src = embedLink;
return;
}
}

player.src = "";
status.innerHTML = 'Platform detected: ' + platform + ' — direct embed may be blocked. <a href="' + link + '" target="_blank" style="color:#9cf;">Open video in new tab</a>';
}
</script>

</body>
</html>
