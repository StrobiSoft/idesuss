<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Idesüss App</title>
  <meta name="description" content="Idesüss App – Watch Without Login" />
  <meta name="theme-color" content="#0f172a" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Idesüss App" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />

  <style>
    :root{
      --bg1:#08111f;
      --bg2:#0f172a;
      --panel:rgba(255,255,255,0.05);
      --panel-border:rgba(255,255,255,0.08);
      --text:#eef4ff;
      --muted:#a4b1c8;
      --accent1:#38bdf8;
      --accent2:#0ea5e9;
      --danger:#cf4a4a;
      --danger2:#b63d3d;
      --shadow:0 20px 50px rgba(0,0,0,.45);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      width: 100%;
      overflow-x: hidden; /* Megakadályozza az oldalirányú csúszkálást iPhone-on */
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(56,189,248,.10), transparent 22%),
        radial-gradient(circle at bottom left, rgba(59,130,246,.10), transparent 24%),
        linear-gradient(155deg,var(--bg1),var(--bg2));
      -webkit-tap-highlight-color: transparent;
    }

    body{
      padding:
        calc(12px + var(--safe-top))
        calc(12px + var(--safe-right))
        calc(18px + var(--safe-bottom))
        calc(12px + var(--safe-left));
    }

    .app{
      max-width:760px;
      width: 100%;
      margin:0 auto;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
      border-radius:28px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
      padding:16px;
      overflow: hidden; /* Fontos iPhone-on, hogy a belső tartalom ne feszítse ki */
    }

    /* --- JAVÍTOTT: Görgethető váltógombok --- */
    .stream-switcher {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      padding: 5px 0 10px 0;
      overflow-x: auto; /* Ez engedi a görgetést */
      -webkit-overflow-scrolling: touch; /* Sima görgetés iOS-en */
      scrollbar-width: none; 
    }
    .stream-switcher::-webkit-scrollbar { display: none; }

    .stream-btn {
      flex: 0 0 auto; /* Megakadályozza, hogy összenyomódjanak a gombok */
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted);
      padding: 10px 16px;
      border-radius: 14px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }
    .stream-btn.active { 
      background: linear-gradient(135deg, var(--accent1), var(--accent2)); 
      color: white;
      border: none;
    }

    .header{
      margin-bottom:18px;
      padding:16px;
      border-radius:22px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
    }

    .header-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:8px;
    }

    .brand{
      font-size:1.6rem;
      font-weight:800;
      letter-spacing:-0.02em;
      margin:0;
    }

    .lang-switch{
      display:inline-flex;
      background:rgba(255,255,255,.05);
      border-radius:999px;
      padding:3px;
    }

    .lang-btn{
      border:none;
      background:transparent;
      color:var(--muted);
      padding:6px 12px;
      border-radius:999px;
      font-size:.8rem;
      font-weight:800;
      cursor:pointer;
    }

    .lang-btn.active{
      background:linear-gradient(135deg,var(--accent1),var(--accent2));
      color:#fff;
    }

    .tagline{
      margin:0;
      color:var(--muted);
      font-size:0.9rem;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:16px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--panel-border);
      border-radius:24px;
      padding:16px;
      width: 100%;
      overflow: hidden;
    }

    .card h2{
      margin:0 0 8px;
      font-size:1.1rem;
    }

    textarea{
      width:100%;
      min-height:100px;
      border:none;
      outline:none;
      border-radius:18px;
      padding:14px;
      background:rgba(255,255,255,.06);
      color:var(--text);
      font-size:1rem;
      border:1px solid rgba(255,255,255,.06);
    }

    .btn-play{
      width:100%;
      border:none;
      border-radius:18px;
      padding:14px;
      background:linear-gradient(135deg,var(--accent1),var(--accent2));
      color:white;
      font-weight:800;
      font-size:1rem;
      margin-top:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }

    .player-shell{
      width:100%;
      aspect-ratio:16/9; /* iPhone-on vízszintesen jobb a 16/9, ha nem csak Shortokat nézel */
      background:#000;
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.06);
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
    }

    .history-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 860px){
      .grid{ grid-template-columns:1fr 1fr; }
      .history-list{ grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="header">
      <div class="header-top">
        <h1 class="brand" id="brandText">Idesüss App</h1>
        <div class="lang-switch">
          <button class="lang-btn" id="langHuBtn">HU</button>
          <button class="lang-btn" id="langEnBtn">EN</button>
        </div>
      </div>
      <p class="tagline" id="taglineText">Watch Without Login</p>
      <div class="counter" id="viewCounter" style="font-size: 0.8rem; color: var(--muted); margin-top: 5px;">Views: ...</div>
    </section>

    <section class="grid">
      <div class="card">
        <h2 id="inputTitle">Videólink</h2>
        <textarea id="videoURL" placeholder="Ide illeszd be..."></textarea>
        <button class="btn-play" id="playBtn">
          <span id="playBtnText">Lejátszás</span>
        </button>
        <div class="status" id="status" style="margin-top:10px; font-size: 0.85rem;"></div>
      </div>

      <div class="card">
        <h2 id="playerTitle">Lejátszó</h2>
        <div class="player-shell" id="player"></div>
        
        <div class="stream-switcher">
          <button class="stream-btn active" onclick="switchStream('', this)">Alapértelmezett</button>
          <button class="stream-btn" onclick="switchStream('https://inv.tux.rs/embed/dQw4w9WgXcQ', this)">Reklámmentes YT</button>
          <button class="stream-btn" onclick="switchStream('https://player.twitch.tv/?channel=riot&parent=' + window.location.hostname, this)">Twitch</button>
          <button class="stream-btn" onclick="switchStream('https://www.dailymotion.com/embed/video/x8m6m73', this)">Dailymotion</button>
        </div>
      </div>
    </section>

    <section class="card" style="margin-top:16px;">
      <h2 id="historyTitle">Előzmények</h2>
      <div id="historyList" class="history-list"></div>
      <button id="clearHistoryBtn" style="background:none; border:none; color:var(--danger); cursor:pointer; margin-top:15px; font-weight:bold;">Törlés</button>
    </section>
  </div>

  <script>
    // --- JS FUNKCIÓK (Megtartva az eredeti logikát, de az új váltóval kiegészítve) ---
    const videoURL = document.getElementById("videoURL");
    const playBtn = document.getElementById("playBtn");
    const player = document.getElementById("player");
    const statusBox = document.getElementById("status");
    const historyList = document.getElementById("historyList");

    function setStatus(text, type) {
      statusBox.textContent = text;
      statusBox.style.color = type === "error" ? "var(--danger)" : "var(--accent1)";
    }

    function resetPlayer() {
      player.innerHTML = `<div style="padding:20px; text-align:center; color:var(--muted);">Várakozás videóra...</div>`;
    }

    function switchStream(url, btn) {
      document.querySelectorAll('.stream-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      if (!url) {
        resetPlayer();
        return;
      }
      player.innerHTML = `<iframe src="${url}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
      setStatus("Váltás sikeres!", "success");
    }

    function loadVideo() {
      const url = videoURL.value.trim();
      if (!url) { setStatus("Adj meg egy linket!", "error"); return; }
      
      // Egyszerűsített YouTube detektálás az összefűzéshez
      if (url.includes("youtube.com") || url.includes("youtu.be")) {
        let videoId = "";
        if (url.includes("v=")) videoId = url.split("v=")[1].split("&")[0];
        else videoId = url.split("/").pop();
        
        player.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>`;
        setStatus("Betöltve!", "success");
      } else {
        player.innerHTML = `<div style="padding:20px; text-align:center;"><a href="${url}" target="_blank" style="color:var(--accent1)">Megnyitás külső lapon</a></div>`;
      }
    }

    playBtn.addEventListener("click", loadVideo);
    resetPlayer();
    
    // Globálissá tétel a gomboknak
    window.switchStream = switchStream;
  </script>
</body>
</html>
