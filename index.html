<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Idesüss™ — Főoldal</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --line: #d7e0ea;
      --text: #17324d;
      --muted: #5e748d;
      --primary: #0d5bd7;
      --primary-soft: #e7f0ff;
      --shadow: 0 10px 28px rgba(22, 44, 77, 0.08);
      --hero-blue-1: #0f49d8;
      --hero-blue-2: #3b82f6;
      --hero-blue-3: #8fd2ff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: #f8fbff;
      line-height: 1.5;
    }

    .container { width: min(1240px, calc(100% - 32px)); margin: 0 auto; }

    /* ===== EREDETI FEJLÉC VISSZAÁLLÍTÁSA ===== */
    .site-header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(215, 224, 234, 0.9);
    }
    .header-inner { min-height: 88px; display: flex; align-items: center; justify-content: space-between; padding: 14px 0; }
    .brand-wrap { display: flex; align-items: center; gap: 16px; }
    .brand-logo { width: 52px; height: 52px; border-radius: 14px; box-shadow: var(--shadow); background: white; }
    .brand-title { font-size: clamp(2.2rem, 4.4vw, 3.4rem); font-weight: 900; letter-spacing: -0.05em; margin: 0; color: #102542; }
    .tm-mark { font-size: 0.42em; vertical-align: super; margin-left: 4px; }
    .brand-subtitle { margin: 8px 0 0; color: var(--muted); font-size: 1rem; }

    /* ===== GLASS GOMBOK - AZ EREDETI RECEPT ALAPJÁN ===== */
    .btn, .miniapp-btn {
      position: relative;
      padding: 14px 22px;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      border: none;
      background: linear-gradient(145deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.4), inset 0 -3px 6px rgba(0,0,0,0.4), 0 8px 20px rgba(0,0,0,0.5);
      transition: all 0.2s ease;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .btn-primary { background: linear-gradient(135deg, var(--primary), #2f7cf0); }
    .btn-soft { background: var(--primary-soft); color: var(--primary); box-shadow: var(--shadow); }

    .btn::before, .miniapp-btn::before {
      content: ""; position: absolute; top: 4px; left: 8%; width: 84%; height: 40%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.6), rgba(255,255,255,0.05));
      border-radius: 50%; pointer-events: none;
    }

    /* ===== HERO ÉS MINILAP ÉLMÉNY ===== */
    .hero { padding: 28px 0; }
    .hero-shell {
      position: relative; overflow: hidden; border-radius: 32px;
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow: 0 26px 60px rgba(13, 58, 140, 0.18);
      background: linear-gradient(135deg, var(--hero-blue-1) 0%, var(--hero-blue-2) 48%, var(--hero-blue-3) 100%);
      padding: 40px;
    }
    .hero-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 28px; align-items: center; }
    .hero-copy { color: white; }
    .hero-lead { font-size: clamp(1.2rem, 2vw, 1.7rem); font-weight: 700; line-height: 1.3; margin-top: 20px; }

    .hero-miniapp {
      background: rgba(255,255,255,0.84); backdrop-filter: blur(14px);
      border-radius: 28px; padding: 26px; box-shadow: 0 18px 50px rgba(20, 55, 125, 0.22);
    }
    .input {
      width: 100%; border: 1px solid #cfdbe8; border-radius: 16px;
      padding: 16px; font-size: 1rem; margin: 15px 0; outline: none;
    }

    /* VIDEÓ KONTÉNER */
    #videoWrapper {
      display: none; margin-top: 20px; border-radius: 20px;
      overflow: hidden; background: #000; box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    }
    video { width: 100%; display: block; }

    /* LÁBLÉC */
    .footer { padding: 40px 0; text-align: center; }
    .footer-card {
      background: var(--surface); border: 1px solid var(--line);
      border-radius: 22px; padding: 22px; box-shadow: var(--shadow);
    }
    .powered { font-weight: 800; color: var(--primary); }

    @media (max-width: 900px) { .hero-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <div class="brand-wrap">
        <img src="/favicon.png" alt="logo" class="brand-logo" />
        <div class="brand-text">
          <h2 class="brand-title">Idesüss<span class="tm-mark">™</span></h2>
          <p class="brand-subtitle">Főoldal + mini app élmény</p>
        </div>
      </div>
    </div>
  </header>

  <main class="hero">
    <div class="container">
      <div class="hero-shell">
        <div class="hero-grid">
          <div class="hero-copy">
            <h1 style="font-size: 3rem; margin: 0; font-weight: 900;">Idesüss<span class="tm-mark">™</span></h1>
            <p class="hero-lead">Próbáld ki közvetlenül a főoldalon népszerű minialkalmazásunkat!</p>
          </div>

          <div class="hero-miniapp">
            <h3 style="margin:0; color: var(--text);">Videó kicsomagolása</h3>
            <input id="videoUrl" class="input" type="url" placeholder="TikTok, Insta, YT link helye...">
            
            <div style="display: flex; gap: 12px;">
              <button id="pasteBtn" class="miniapp-btn btn-soft" style="flex:1">Beillesztés</button>
              <button id="openBtn" class="miniapp-btn btn-primary" style="flex:1">Megnyitás</button>
            </div>

            <div id="statusLabel" style="margin-top:15px; text-align:center; font-weight:bold; color: var(--muted);">
              Várjuk a linket...
            </div>

            <div id="videoWrapper">
              <video id="customPlayer" controls playsinline></video>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-card">
        <p>© 2026 Idesüss™ — Minden jog fenntartva.</p>
        <div class="powered">Powered by StZoo 2026</div>
      </div>
    </div>
  </footer>

  <script>
    const videoInput = document.getElementById('videoUrl');
    const statusLabel = document.getElementById('statusLabel');
    const videoWrapper = document.getElementById('videoWrapper');
    const player = document.getElementById('customPlayer');

    document.getElementById('pasteBtn').onclick = async () => {
      try {
        const text = await navigator.clipboard.readText();
        videoInput.value = text;
        statusLabel.textContent = "Beillesztve!";
      } catch (err) { statusLabel.textContent = "Hiba a beillesztésnél."; }
    };

    async function openUrl() {
      const url = videoInput.value.trim();
      if (!url) return;

      statusLabel.textContent = "Kicsomagolás...";
      statusLabel.style.color = "var(--primary)";

      try {
        const response = await fetch("https://api.cobalt.tools/api/json", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
          body: JSON.stringify({ url: url, videoQuality: "720" })
        });
        const data = await response.json();

        if (data.url) {
          player.src = data.url;
          videoWrapper.style.display = "block";
          player.play();
          statusLabel.textContent = "Siker! Jó szórakozást!";
          statusLabel.style.color = "#1f9d55";
        } else { throw new Error(); }
      } catch (e) {
        statusLabel.textContent = "Külső megnyitás...";
        setTimeout(() => window.open(url, "_blank"), 1000);
      }
    }
    document.getElementById('openBtn').onclick = openUrl;
  </script>
</body>
</html>
