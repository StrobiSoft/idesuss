<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Idesüss App</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Idesüss">
    <meta name="theme-color" content="#0f172a">

    <style>
        :root {
            --bg1: #08111f; --bg2: #0f172a;
            --panel: rgba(255, 255, 255, 0.05);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text: #eef4ff; --muted: #a4b1c8;
            --accent: linear-gradient(135deg, #38bdf8, #0ea5e9);
            --danger: #cf4a4a;
            --safe-top: env(safe-area-inset-top, 0px);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        html, body {
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            background: linear-gradient(155deg, var(--bg1), var(--bg2));
            color: var(--text); font-family: -apple-system, system-ui, sans-serif;
            overflow-x: hidden;
        }

        body { padding: calc(20px + var(--safe-top)) 15px 40px; }

        .app-container {
            max-width: 760px; margin: 0 auto;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--panel-border);
            border-radius: 32px; padding: 20px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Fejléc és Nyelvváltó */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; padding: 0 10px;
        }
        .brand h1 { font-size: 1.7rem; margin: 0; font-weight: 800; letter-spacing: -1px; }
        
        .lang-switch {
            background: var(--panel); border-radius: 12px; padding: 4px;
            display: flex; gap: 4px; border: 1px solid var(--panel-border);
        }
        .lang-btn {
            border: none; background: none; color: var(--muted);
            padding: 6px 12px; border-radius: 8px; font-weight: 700;
            font-size: 0.75rem; cursor: pointer; transition: 0.2s;
        }
        .lang-btn.active { background: var(--accent); color: white; }

        /* Kártyák */
        .card {
            background: var(--panel); border: 1px solid var(--panel-border);
            border-radius: 24px; padding: 20px; margin-bottom: 16px;
        }
        .card h2 { font-size: 1.1rem; margin: 0 0 15px; opacity: 0.9; }

        textarea {
            width: 100%; min-height: 100px; background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
            color: white; padding: 15px; font-size: 1rem; outline: none;
            resize: none; -webkit-appearance: none;
        }

        .btn-main {
            width: 100%; padding: 18px; margin-top: 15px; border: none;
            border-radius: 16px; background: var(--accent); color: white;
            font-weight: 800; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.3);
        }

        /* Lejátszó szekció */
        .player-shell {
            width: 100%; aspect-ratio: 16/9; background: #000;
            border-radius: 20px; overflow: hidden; position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .player-shell.portrait {
            aspect-ratio: 9/16; max-width: 320px; margin: 0 auto;
        }
        iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:none; }

        /* Előzmények */
        .history-item {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.03); padding: 12px 15px;
            border-radius: 14px; margin-bottom: 8px; font-size: 0.85rem;
        }
        .history-link { color: var(--accent1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; margin-right: 10px; }
        .btn-del { color: var(--danger); background: none; border: none; font-weight: bold; }

        .status-msg { text-align: center; font-size: 0.8rem; margin-top: 10px; color: var(--muted); }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header">
        <div class="brand">
            <h1 id="txt-title">Idesüss</h1>
        </div>
        <div class="lang-switch">
            <button class="lang-btn active" onclick="setLang('hu')">HU</button>
            <button class="lang-btn" onclick="setLang('en')">EN</button>
        </div>
    </header>

    <main>
        <div class="card">
            <h2 id="txt-input-label">Videó link beillesztése</h2>
            <textarea id="videoURL" placeholder="YouTube, TikTok, Facebook Reels..."></textarea>
            <button class="btn-main" id="txt-play-btn" onclick="processVideo()">Indítás</button>
            <div id="status" class="status-msg"></div>
        </div>

        <div id="playerCard" class="card" style="display:none;">
            <h2 id="txt-player-label">Lejátszó</h2>
            <div id="pShell" class="player-shell">
                <div id="pTarget"></div>
            </div>
        </div>

        <div class="card">
            <h2 id="txt-hist-label">Előzmények</h2>
            <div id="historyList"></div>
            <button onclick="clearHistory()" id="txt-clear-btn" style="background:none; border:none; color:var(--danger); font-size:0.8rem; margin-top:10px; cursor:pointer;">Összes törlése</button>
        </div>
    </main>
</div>

<script>
    // --- NYELVI ADATOK ---
    const i18n = {
        hu: { title: "Idesüss", input: "Beillesztés", play: "Lejátszás", player: "Lejátszó", hist: "Előzmények", clear: "Törlés", loading: "Felismerés...", error: "Hibás link!" },
        en: { title: "Idesüss", input: "Paste Link", play: "Play Video", player: "Player", hist: "History", clear: "Clear All", loading: "Detecting...", error: "Invalid link!" }
    };
    let currentLang = 'hu';

    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        updateUI();
    }

    function updateUI() {
        const t = i18n[currentLang];
        document.getElementById('txt-title').textContent = t.title;
        document.getElementById('txt-input-label').textContent = t.input;
        document.getElementById('txt-play-btn').textContent = t.play;
        document.getElementById('txt-player-label').textContent = t.player;
        document.getElementById('txt-hist-label').textContent = t.hist;
        document.getElementById('txt-clear-btn').textContent = t.clear;
    }

    // --- VIDEÓ LOGIKA ---
    function processVideo() {
        const url = document.getElementById('videoURL').value.trim();
        const status = document.getElementById('status');
        const shell = document.getElementById('pShell');
        const target = document.getElementById('pTarget');
        const card = document.getElementById('playerCard');

        if(!url) return;
        status.textContent = i18n[currentLang].loading;

        let embedUrl = "";
        let isPortrait = false;

        try {
            // YouTube
            if (url.includes("youtube.com") || url.includes("youtu.be")) {
                let vId = url.includes("shorts/") ? url.split("shorts/")[1].split(/[?&]/)[0] : 
                         (url.includes("v=") ? url.split("v=")[1].split("&")[0] : url.split("/").pop().split(/[?&]/)[0]);
                embedUrl = `https://www.youtube-nocookie.com/embed/${vId}?autoplay=1`;
                if(url.includes("shorts/")) isPortrait = true;
            }
            // TikTok
            else if (url.includes("tiktok.com")) {
                const vId = url.split("/video/")[1]?.split(/[?&]/)[0] || url.split("/").pop().split(/[?&]/)[0];
                embedUrl = `https://www.tiktok.com/embed/v2/${vId}`;
                isPortrait = true;
            }
            // Facebook / Reels
            else if (url.includes("facebook.com") || url.includes("fb.watch")) {
                const clean = url.split(/[?&]mibextid/)[0];
                embedUrl = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(clean)}&show_text=0&autoplay=1`;
                if(url.includes("reels") || url.includes("fb.watch")) isPortrait = true;
            }

            if(embedUrl) {
                card.style.display = "block";
                shell.className = isPortrait ? "player-shell portrait" : "player-shell";
                target.innerHTML = `<iframe src="${embedUrl}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
                status.textContent = "";
                saveHistory(url);
                card.scrollIntoView({ behavior: 'smooth' });
            } else {
                status.textContent = i18n[currentLang].error;
            }
        } catch(e) {
            status.textContent = i18n[currentLang].error;
        }
    }

    // --- ELŐZMÉNYEK ---
    function saveHistory(url) {
        let history = JSON.parse(localStorage.getItem('idesuss_hist') || '[]');
        if(!history.includes(url)) {
            history.unshift(url);
            if(history.length > 10) history.pop();
            localStorage.setItem('idesuss_hist', JSON.stringify(history));
            renderHistory();
        }
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        const history = JSON.parse(localStorage.getItem('idesuss_hist') || '[]');
        list.innerHTML = history.map(url => `
            <div class="history-item">
                <span class="history-link" onclick="document.getElementById('videoURL').value='${url}'; processVideo();">${url}</span>
                <button class="btn-del" onclick="deleteItem('${url}')">✕</button>
            </div>
        `).join('');
    }

    function deleteItem(url) {
        let history = JSON.parse(localStorage.getItem('idesuss_hist') || '[]');
        history = history.filter(item => item !== url);
        localStorage.setItem('idesuss_hist', JSON.stringify(history));
        renderHistory();
    }

    function clearHistory() {
        localStorage.removeItem('idesuss_hist');
        renderHistory();
    }

    // Init
    updateUI();
    renderHistory();
</script>

</body>
</html>
