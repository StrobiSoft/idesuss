<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Idesüss Player</title>

<link rel="icon" href="favicon.png">

<style>

body{
background:#0f172a;
color:white;
font-family:Arial, Helvetica, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#1e293b;
padding:30px;
border-radius:18px;
width:520px;
box-shadow:0 0 40px rgba(0,0,0,0.5);
}

h1{
margin-top:0;
font-size:26px;
}

textarea{
width:100%;
height:80px;
border-radius:10px;
border:none;
padding:10px;
margin-top:10px;
}

.play-btn{
display:inline-flex;
align-items:center;
gap:8px;
margin-top:15px;
padding:12px 22px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#38bdf8,#0ea5e9);
color:white;
font-size:18px;
cursor:pointer;
}

.eye{
position:relative;
width:24px;
height:24px;
}

.eye img{
position:absolute;
width:24px;
height:24px;
left:0;
top:0;
opacity:0;
}

.eye-open{
opacity:1;
}

.play-btn:hover .eye-open{
animation:eyeOpen 0.2s forwards;
}

.play-btn:hover .eye-mid{
animation:eyeMid 0.2s forwards;
}

.play-btn:hover .eye-wink{
animation:eyeWink 0.2s forwards;
}

@keyframes eyeOpen{
0%{opacity:1;}
40%{opacity:0;}
100%{opacity:0;}
}

@keyframes eyeMid{
0%{opacity:0;}
40%{opacity:1;}
70%{opacity:0;}
100%{opacity:0;}
}

@keyframes eyeWink{
0%{opacity:0;}
70%{opacity:1;}
100%{opacity:1;}
}

.player{
margin-top:20px;
background:#020617;
height:260px;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
color:#64748b;
}

</style>

</head>

<body>

<div class="container">

<h1>Idesüss Player</h1>
<p>Watch Without Login</p>

<textarea placeholder="Ide illeszd be a videó linkjét..."></textarea>

<button class="play-btn">

<span class="eye">
<img src="eye-open.svg" class="eye-open">
<img src="eye-mid.svg" class="eye-mid">
<img src="eye-wink.svg" class="eye-wink">
</span>

Play

</button>

<div class="player">
Még nincs betöltött videó
</div>

</div>

</body>
</html>
