<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Idesüss™ — Főoldal</title>
  <style>
    :root {
      --bg: #f4f7fb; --text: #17324d; --primary: #0d5bd7; --shadow: 0 10px 28px rgba(22, 44, 77, 0.08);
      --radius: 18px; --hero-gradient: linear-gradient(135deg, #0f49d8 0%, #3b82f6 48%, #8fd2ff 100%);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; color: var(--text); background: var(--bg); line-height: 1.5; }
    .container { width: min(1240px, calc(100% - 32px)); margin: 0 auto; }
    
    /* Header */
    .site-header { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid #d7e0ea; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; }
    .brand-logo { width: 52px; height: 52px; border-radius: 14px; box-shadow: var(--shadow); }
    .brand-title { font-size: 2rem; font-weight: 900; margin: 0; color: #102542; }

    /* Hero & App */
    .hero { padding: 30px 0; }
    .hero-shell { border-radius: 32px; background: var(--hero-gradient); padding: 30px; color: white; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
    .hero-miniapp { background: rgba(255,255,255,0.9); color: var(--text); padding: 25px; border-radius: 28px; box-shadow: var(--shadow); }
    
    /* Gombok - Idesüss Glass stílus */
    .btn { padding: 12px 20px; border-radius: 16px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-soft { background: #e7f0ff; color: var(--primary); }
    .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

    .input { width: 100%; border: 1px solid #cfdbe8; border-radius: 16px; padding: 16px; font-size: 1rem; margin-top: 10px; }
    .status-pill { display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 20px; background: #fff; font-size: 0.85rem; margin-top: 10px; border: 1px solid #dce7f3; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #94a9c2; }
    .status-ok .status-dot { background: #1f9d55; }

    /* Videó Lejátszó */
    #videoContainer { margin-top: 25px; display: none; background: #000; border-radius: 18px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    video { width: 100%; max-height: 550px; display: block; }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <div style="display:flex; align-items:center; gap:15px;">
        <img src="/favicon.png" alt="logo" class="brand-logo" />
        <h2 class="brand-title">Idesüss<span style="font-size:0.5em; vertical-align:top;">™</span></h2>
      </div>
      <div style="display:flex; gap:10px;">
        <select id="langSelect" style="border-radius:10px; padding:5px;">
          <option value="hu">🇭🇺 HU</option>
          <option value="en">🇬🇧 EN</option>
        </select>
        <span id="headerClock" style="font-weight:bold; background:#fff; padding:5px 10px; border-radius:10px;">00:00</span>
      </div>
    </div>
  </header>

  <main class="hero">
    <div class="container">
      <div class="hero-shell">
        <div>
          <h1 style="font-size:3rem; margin:0;">Idesüss™</h1>
          <p id="heroLeadText">Próbáld ki a kicsomagolós lejátszót közvetlenül itt!</p>
          <a href="https://idesuss.net/app" class="btn btn-primary" style="margin-top:20px; background:white; color:var(--primary);">Webapp Megnyitása</a>
        </div>

        <div class="hero-miniapp">
          <h3 id="inputTitle" style="margin-top:0;">Videólink beillesztése</h3>
          <input id="videoUrl" class="input" type="url" placeholder="https://tiktok.com/..." />
          
          <div style="display:flex; gap:10px; margin-top:15px;">
            <button id="pasteBtn" class="btn btn-soft" style="flex:1;">Beillesztés</button>
            <button id="openBtn" class="btn btn-primary" style="flex:2;">Kicsomagolás</button>
          </div>

          <div id="clipboardStatus" class="status-pill">
            <span class="status-dot"></span> <span id="statusText">Várjuk a linket...</span>
          </div>

          <div id="videoContainer">
            <video id="customPlayer" controls></video>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const els = {
      url: document.getElementById("videoUrl"),
      status: document.getElementById("statusText"),
      pill: document.getElementById("clipboardStatus"),
      clock: document.getElementById("headerClock"),
      vContainer: document.getElementById("videoContainer"),
      player: document.getElementById("customPlayer")
    };

    // Óra frissítése
    setInterval(() => {
      const now = new Date();
      els.clock.textContent = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    }, 1000);

    // Kicsomagolós funkció (Cobalt API)
    async function openUrl() {
        const videoInput = els.url.value.trim();
        if (!videoInput.startsWith("http")) {
            els.status.textContent = "Kérlek, adj meg egy érvényes linket!";
            return;
        }

        els.status.textContent = "Kicsomagolás... Kérlek várj.";
        els.pill.className = "status-pill";

        try {
            const response = await fetch("https://api.cobalt.tools/api/json", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Accept": "application/json" },
                body: JSON.stringify({ url: videoInput, videoQuality: "720" })
            });

            const data = await response.json();

            if (data.url) {
                els.player.src = data.url;
                els.vContainer.style.display = "block";
                els.player.play();
                els.status.textContent = "Siker! Jó szórakozást!";
                els.pill.classList.add("status-ok");
                els.vContainer.scrollIntoView({ behavior: 'smooth' });
            } else {
                throw new Error();
            }
        } catch (e) {
            els.status.textContent = "Hiba! Nem sikerült kicsomagolni a videót.";
            window.open(videoInput, "_blank"); // Tartalék
        }
    }

    // Eseménykezelők
    document.getElementById("openBtn").onclick = openUrl;
    document.getElementById("pasteBtn").onclick = async () => {
        try {
            const text = await navigator.clipboard.readText();
            els.url.value = text;
            els.status.textContent = "Beillesztve a vágólapról.";
        } catch (e) {
            els.status.textContent = "Nincs hozzáférés a vágólaphoz.";
        }
    };
  </script>
</body>
</html>
