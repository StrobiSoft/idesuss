<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Idesüss™ — Főoldal</title>
  <meta
    name="description"
    content="Az Idesüss egy könnyű webes felület nyilvános videólinkek tisztább, gyorsabb és egyszerűbb megnyitásához."
  />
  <meta name="theme-color" content="#0d5bd7" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />

  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --surface-alt: #eef3f9;
      --line: #d7e0ea;
      --text: #17324d;
      --muted: #5e748d;
      --primary: #0d5bd7;
      --primary-dark: #0b4cb3;
      --primary-soft: #e7f0ff;
      --accent: #ffb547;
      --success: #1f9d55;
      --warning: #b7791f;
      --danger: #c53030;
      --shadow: 0 10px 28px rgba(22, 44, 77, 0.08);
      --radius: 18px;
      --maxw: 1240px;
      --header-h: 88px;
      --hero-blue-1: #0f49d8;
      --hero-blue-2: #3b82f6;
      --hero-blue-3: #8fd2ff;
    }

    /* ===== ALAP GOMB RESET ===== */
    button {
      font-family: inherit;
      border: none;
      cursor: pointer;
    }

    /* ===== IDESÜSS GLASS BUTTON ===== */
    .btn,
    button,
    .install-btn,
    .open-btn {
      position: relative;
      padding: 14px 22px;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      /* ÜVEG ALAP */
      background: linear-gradient(
        145deg,
        rgba(255,255,255,0.15),
        rgba(255,255,255,0.05)
      );
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      /* 3D hatás */
      box-shadow:
        inset 0 2px 4px rgba(255,255,255,0.4),
        inset 0 -3px 6px rgba(0,0,0,0.4),
        0 8px 20px rgba(0,0,0,0.5);
      transition: all 0.2s ease;
    }

    /* ===== FELSŐ FÉNYCSÍK ===== */
    .btn::before,
    button::before,
    .install-btn::before,
    .open-btn::before {
      content: "";
      position: absolute;
      top: 4px;
      left: 8%;
      width: 84%;
      height: 40%;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0.6),
        rgba(255,255,255,0.05)
      );
      border-radius: 50%;
      pointer-events: none;
    }

    /* ===== HOVER ===== */
    .btn:hover,
    button:hover,
    .install-btn:hover,
    .open-btn:hover {
      transform: translateY(-2px);
      box-shadow:
        inset 0 2px 6px rgba(255,255,255,0.5),
        inset 0 -4px 8px rgba(0,0,0,0.5),
        0 12px 28px rgba(0,0,0,0.6);
    }

    /* ===== LENYOMÁS ===== */
    .btn:active,
    button:active,
    .install-btn:active,
    .open-btn:active {
      transform: translateY(1px);
      box-shadow:
        inset 0 4px 8px rgba(0,0,0,0.5),
        inset 0 -2px 4px rgba(255,255,255,0.3),
        0 4px 10px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(13, 91, 215, 0.08), transparent 22%),
        linear-gradient(180deg, #f8fbff 0%, #f3f7fb 100%);
      line-height: 1.5;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .container {
      width: min(var(--maxw), calc(100% - 32px));
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(215, 224, 234, 0.9);
    }

    .header-inner {
      min-height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0;
    }

    .brand-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .brand-logo {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      object-fit: cover;
      display: block;
      flex: 0 0 auto;
      box-shadow: var(--shadow);
      background: white;
    }

    .brand-text { min-width: 0; }

    .brand-title {
      font-size: clamp(3.2rem, 5vw, 5.4rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      margin: 0;
      line-height: 0.92;
      color: #102542;
      white-space: nowrap;
    }

    .tm-mark {
      font-size: 0.34em;
      vertical-align: super;
      margin-left: 4px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .brand-subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 1rem;
      white-space: nowrap;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
      flex: 0 0 auto;
    }

    .header-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 50px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface);
      box-shadow: var(--shadow);
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }

    .lang-select {
      appearance: none;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      outline: none;
      min-width: 150px;
    }

    .lang-select option { color: #000; }

    .lang-clock-chip{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
}

.header-clock-inline{
  font-weight:800;
  font-size:1rem;
  letter-spacing:.04em;
  color:#102a56;
  white-space:nowrap;
}
    .auth-chip{
  gap:10px;
}

.auth-link{
  border:none;
  cursor:pointer;
  font-weight:700;
  font-size:13px;
  color:white;
  padding:10px 18px;
  border-radius:999px;

  background:
    linear-gradient(
      135deg,
      rgba(58,134,255,.95),
      rgba(97,175,255,.82)
    );

  box-shadow:
    0 8px 20px rgba(58,134,255,.28),
    inset 0 1px 0 rgba(255,255,255,.45);

  transition:
    transform .18s ease,
    box-shadow .18s ease,
    opacity .18s ease;
}

.auth-link:hover{
  transform:translateY(-1px);
  box-shadow:
    0 10px 24px rgba(58,134,255,.38),
    inset 0 1px 0 rgba(255,255,255,.55);
}

.auth-link:active{
  transform:translateY(1px);
}

.auth-separator{
  opacity:.55;
  font-size:12px;
  font-weight:700;
}

    .btn {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 14px;
      padding: 12px 20px;
      font-size: 0.98rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 48px;
      white-space: nowrap;
    }

    .btn:hover:not(:disabled) { transform: translateY(-1px); }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #2f7cf0);
      color: white;
      box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.28),
      inset 0 -2px 6px rgba(0,0,0,0.12),
      0 14px 32px rgba(13,91,215,0.28),
      0 4px 10px rgba(0,0,0,0.14);
    }

    .btn-soft {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: #cfe0ff;
    }

    .section { padding: 34px 0; }

    .hero { padding: 28px 0 22px; }

    .hero-shell {
      position: relative;
      overflow: hidden;
      border-radius: 32px;
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow: 0 26px 60px rgba(13, 58, 140, 0.18);
      background:
        radial-gradient(circle at 15% 30%, rgba(255,255,255,0.16), transparent 30%),
        radial-gradient(circle at 85% 15%, rgba(255,255,255,0.18), transparent 28%),
        linear-gradient(135deg, var(--hero-blue-1) 0%, var(--hero-blue-2) 48%, var(--hero-blue-3) 100%);
    }

    .hero-shell::before {
      content: "";
      position: absolute;
      inset: auto -10% -22% -10%;
      height: 62%;
      background:
        radial-gradient(ellipse at center, rgba(255,255,255,0.18), transparent 58%),

          ellipse at center,
          rgba(255,255,255,0.09) 0 8%,
          rgba(255,255,255,0.02) 8% 16%

      opacity: 0.55;
      pointer-events: none;
    }

    .hero-grid {

      display: grid;
      grid-template-columns: 1.02fr 0.98fr;
      gap: 28px;
      align-items: stretch;

    }

    .hero-copy {
      display: flex;

      justify-content: space-between;

    .hero-brand {

    }

    .hero-brand-logo {

    .hero-brand-title {

    .hero-lead {

    .hero-actions {

    .field {
      display: grid;
      gap: 10px;

    }

    .field label {
      font-size: 0.96rem;
      font-weight: 800;
      color: #17324d;
    }

    .input {
      width: 100%;
      border: 1px solid #cfdbe8;
      background: rgba(255,255,255,0.92);
      border-radius: 16px;
      padding: 16px 18px;
      font-size: 1rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .input:focus {
      border-color: #7baeff;
      box-shadow: 0 0 0 4px rgba(13, 91, 215, 0.08);
      background: #ffffff;
    }

    .input-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 14px;
    }

    .miniapp-btn {
      min-width: 132px;
      min-height: 52px;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 800;
    }

    .status-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.72);

      font-weight: 700;

    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #94a9c2;
      flex: 0 0 auto;
    }

    .status-ok .status-dot { background: var(--success); }
    .status-warn .status-dot { background: var(--warning); }
    .status-error .status-dot { background: var(--danger); }

    .hero-bottom {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 28px 22px;
      flex-wrap: wrap;
    }

    .hero-banner {
      flex: 1 1 620px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 64px;
      padding: 12px 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.62);
      border: 1px solid rgba(255,255,255,0.36);
      backdrop-filter: blur(12px);
      color: #1f3860;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }

    .hero-banner-text {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      font-size: 1rem;
    }

    .hero-banner-icon { font-size: 1.2rem; }

    .hero-banner-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.56);
      border: 1px solid rgba(31,56,96,0.12);
      font-weight: 800;
      color: #2d5189;
      white-space: nowrap;
    }

    .hero-footer-links {
      flex: 0 0 auto;
      min-width: 280px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      color: rgba(255,255,255,0.94);
      font-size: 1rem;
      font-weight: 700;
    }

    .hero-footer-links a { color: rgba(255,255,255,0.94); }
    .hero-footer-links .powered { font-weight: 900; color: #fff; }

    .content-section { padding: 34px 0; }
    .section-head { margin-bottom: 18px; }

    .section-kicker {
      color: var(--primary);

      font-size: 0.9rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 10px;

    .section-title {
      margin: 0 0 10px;

      line-height: 1.06;
      letter-spacing: -0.03em;
    }

    .section-desc {
      margin: 0;

    }

    .info-grid {

      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
      align-items: start;
    }

    .info-card,
    .feature-box,
    .about-grid > article,
    .footer-card {

      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .info-card { padding: 22px; }
    .feature-box { padding: 18px; }

    .counter-panel {
      background: linear-gradient(180deg, #f8fbff, #ffffff);
      border: 1px solid #dbe7f3;
      border-radius: 16px;
      padding: 16px;
    }

    .counter-label {
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .counter-value {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }

    .counter-note { color: var(--muted); font-size: 0.92rem; }

    .support-list,
    .how-list {
      display: grid;
      gap: 10px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .support-item,
    .how-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f8fbff;
      border: 1px solid #dce7f3;
    }

    .support-icon,
    .how-num {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 0.92rem;
      font-weight: 800;
      flex: 0 0 auto;
      background: var(--primary-soft);
      color: var(--primary);
    }

    .about-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .about-grid > article { padding: 22px; }
    .about-grid h3 { margin: 0 0 10px; font-size: 1.12rem; }
    .about-grid p { margin: 0; color: var(--muted); }

    .about-story {
      margin-top: 18px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .about-story h3 { margin: 0 0 12px; font-size: 1.2rem; }
    .about-story p { margin: 0; color: var(--muted); line-height: 1.65; }

    .footer { padding: 16px 0 36px; }
    .footer-card { padding: 22px; }

    .footer-top {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      flex-wrap: wrap;
      padding-bottom: 18px;
      border-bottom: 1px solid #e0e8f2;
      margin-bottom: 18px;
    }

    .footer-brand h3 { margin: 0 0 6px; font-size: 1.2rem; }
    .footer-brand p { margin: 0; color: var(--muted); }

    .footer-links { display: flex; flex-wrap: wrap; gap: 10px; }

    .footer-links a,
    .footer-links button {
      border: 1px solid var(--line);
      background: #fbfdff;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      font: inherit;
    }

    .footer-links button:hover,
    .footer-links a:hover {
      background: #f3f8ff;
      border-color: #cfe0ff;
    }

    .footer-bottom {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .footer-stats{
  display:flex;
  gap:18px;
  align-items:center;
  justify-content:center;
  flex-wrap:wrap;
  margin-bottom:10px;
  font-size:0.95rem;
  font-weight:700;
 color:#102a56;
}

.footer-stats span{
  background:rgba(13,91,215,0.08);
  border:1px solid rgba(13,91,215,0.18);
  padding:8px 14px;

  box-shadow:0 4px 18px rgba(0,0,0,0.12);

    .powered { font-weight: 800; color: var(--primary); }
    .small-note { color: var(--muted); font-size: 0.9rem; }

    @media (max-width: 1080px) {
      .hero-grid, .info-grid, .about-grid { grid-template-columns: 1fr; }
      .hero-webapp-btn { min-width: 0; width: 100%; }
    }
    .footer-action-btn {
  text-decoration: none;
  border: 1px solid rgba(13, 91, 215, 0.18);
  background: linear-gradient(
    180deg,
    rgba(255,255,255,0.95),

  );
  color: #173b74;
  border-radius: 999px;
  padding: 11px 18px;
  font-weight: 900;
  cursor: pointer;
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,0.95),
    inset 0 -2px 4px rgba(13,91,215,0.08),

    0 3px 8px rgba(0,0,0,0.10);
  transition:
    transform .18s ease,
    box-shadow .18s ease,
    background .18s ease;
}

#footerOpenAppLink,
#footerOpenAppLink:link,
#footerOpenAppLink:visited,
#footerOpenAppLink:hover,
#footerOpenAppLink:active {
  color: #000 !important;
}

.footer-action-btn:hover {

  transform: translateY(-2px);

  background:
    linear-gradient(
      180deg,
      #ffffff,
      #f1f2f4
    );

  box-shadow:
    inset 0 2px 0 rgba(255,255,255,1),
    inset 0 -2px 6px rgba(13,91,215,0.10),
    0 16px 34px rgba(13,91,215,0.24),
    0 5px 12px rgba(0,0,0,0.12);

    .upsert({

    }, {

function normalizeNickname(name) {
  return name
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9_]/g, "");
}

async function ensureProfileExists(user) {

  const { data: existing } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  if (existing) return existing;

  const { data, error } = await supabaseClient
    .from("profiles")
    .insert({
      id: user.id,
      email: user.email,
      role: "user",
      profile_completed: false
    })
    .select()
    .single();

  if (error) {
    console.error(error);
    return null;
  }

  return data;
}

async function checkProfileCompletion() {

  if (!currentUser) return;

  createProfileModal();

  const modal = document.getElementById("idesussProfileModal");

  const profile = await ensureProfileExists(currentUser);

  if (!profile) return;

  if (profile.profile_completed) {

    modal.style.display = "none";

    return;
  }

  modal.style.display = "flex";

}

async function validateNickname(rawNickname) {

  const status =
    document.getElementById("nicknameStatus");

  const normalized =
    normalizeNickname(rawNickname);

  if (!normalized) {

    status.textContent =
      "Adj meg egy becenevet.";

    status.style.color = "#c53030";

    return false;
  }

  if (
    RESERVED_MODERATOR_SUFFIXES.some(
      suffix => normalized.endsWith(suffix)
    )
  ) {

    status.textContent =
      "Ez a végződés moderátori használatra fenntartott.";

    status.style.color = "#c53030";

    return false;
  }

  const { data: reserved } = await supabaseClient
    .from("reserved_nicknames")
    .select("*")
    .eq("nickname_normalized", normalized)
    .maybeSingle();

  if (reserved) {

    status.textContent =
      "Ez a becenév foglalt.";

    status.style.color = "#c53030";

    return false;
  }

  const { data: existing } = await supabaseClient
    .from("profiles")
    .select("id")
    .eq("nickname_normalized", normalized)
    .maybeSingle();

  if (existing) {

    status.textContent =
      "Ez a becenév már használatban van.";

    status.style.color = "#c53030";

    return false;
  }

  status.textContent =
    "A becenév használható.";

  status.style.color = "#1f9d55";

  return true;
}

function getVisitorKey() {

  if (!key) {
    key = "visitor_" + crypto.randomUUID();
    localStorage.setItem("idesuss_visitor_key", key);
  }

  return key;
}

<script>
/* Idesüss Shell Receiver v1
   Főoldali linkfogadó réteg — webapp core érintése nélkül
*/

(function () {
  const SHARED_URL_KEY = "ides_shared_last_url";

  function getIncomingUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get("url") || params.get("u") || "";
  }

  function cleanIncomingUrl(rawUrl) {
    if (!rawUrl) return "";

    let url = rawUrl.trim();

    try {
      url = decodeURIComponent(url);
    } catch (e) {
      // Ha már dekódolt, nem baj, megyünk tovább.
    }

    try {
      const parsed = new URL(url);

      [
        "fbclid",
        "utm_source",
        "utm_medium",
        "utm_campaign",
        "utm_term",
        "utm_content",
        "si",
        "feature"
      ].forEach(param => parsed.searchParams.delete(param));

      return parsed.toString();
    } catch (e) {
      return url;
    }
  }

  function openInIdesussApp(cleanUrl) {
    if (!cleanUrl) return;

    const target = "/app/?url=" + encodeURIComponent(cleanUrl);
    window.location.href = target;
  }

  function initShellReceiver() {
    const incoming = getIncomingUrl();

    if (!incoming) return;

    const cleanUrl = cleanIncomingUrl(incoming);

    if (!cleanUrl) return;

    localStorage.setItem(SHARED_URL_KEY, cleanUrl);
    openInIdesussApp(cleanUrl);
  }

  initShellReceiver();
})();
</script>
