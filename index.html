<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idesüss Video Viewer</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(180deg,#0f1117,#171b26);
color:white;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.app{
width:100%;
max-width:900px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
border-radius:20px;
padding:24px;
box-shadow:0 20px 50px rgba(0,0,0,0.35);
backdrop-filter:blur(8px);
}

h1{
margin:0 0 8px 0;
font-size:clamp(28px,4vw,42px);
text-align:center;
}

.subtitle{
margin:0 0 24px 0;
text-align:center;
color:#c7cede;
font-size:15px;
}

.controls{
display:flex;
gap:12px;
align-items:center;
margin-bottom:18px;
}

input{
flex:1;
padding:14px 16px;
font-size:16px;
border:none;
border-radius:12px;
outline:none;
background:white;
color:#111;
}

button{
padding:14px 20px;
font-size:16px;
font-weight:bold;
border:none;
border-radius:12px;
cursor:pointer;
background:#5b8cff;
color:white;
transition:transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
}

button:hover{
transform:translateY(-1px);
opacity:0.95;
}

.paste-btn{
background:#5f6675;
color:white;
opacity:0.65;
min-width:130px;
}

.paste-btn.active{
background:#5b8cff;
opacity:1;
}

.paste-btn:disabled{
cursor:not-allowed;
transform:none;
}

.status{
min-height:24px;
margin:0 0 18px 0;
color:#d3d9e6;
font-size:14px;
}

.player-wrap{
position:relative;
width:100%;
aspect-ratio:16 / 9;
background:#0b0d12;
border-radius:16px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.06);
}

iframe{
width:100%;
height:100%;
border:none;
display:block;
background:#0b0d12;
}

.tip{
margin-top:16px;
font-size:13px;
color:#98a2b3;
text-align:center;
line-height:1.5;
}

.tip code{
background:rgba(255,255,255,0.08);
padding:2px 6px;
border-radius:6px;
}

@media (max-width:700px){
.app{
padding:18px;
border-radius:16px;
}

.controls{
flex-direction:column;
}

button{
width:100%;
}

input{
width:100%;
}

.paste-btn{
min-width:unset;
}
}

.video-watermark{
position:absolute;
top:10px;
right:12px;
font-size:12px;
font-family:system-ui,sans-serif;
color:rgba(255,255,255,0.55);
background:rgba(0,0,0,0.18);
padding:4px 8px;
border-radius:999px;
backdrop-filter:blur(2px);
pointer-events:none;
user-select:none;
z-index:5;
}

.stzoo-signature{
position:fixed;
bottom:6px;
right:10px;
font-size:10px;
color:rgba(120,120,120,0.6);
font-family:system-ui,sans-serif;
pointer-events:none;
user-select:none;
}
</style>
</head>

<body>

<div class="app">
<h1>Idesüss Video Viewer</h1>
<p class="subtitle">Watch Without Login</p>

<div class="controls">
<input id="videolink" placeholder="Paste video link here">
<button id="pasteBtn" class="paste-btn" onclick="pasteVideoLink()" disabled>Paste</button>
<button onclick="play()">Play</button>
</div>

<div class="player-wrap">
<iframe id="player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
<div class="video-watermark">idesüss.net</div>
</div>

<p id="status" class="status"></p>

<p class="tip">
YouTube linkek beágyazva mennek. Más platformoknál, ha az embed tiltott,
az oldal új lapon nyitási linket ad.
</p>
</div>

<script>
function detectPlatform(link){
  const lower = link.toLowerCase();

  if (
    lower.includes("youtube.com") ||
    lower.includes("youtu.be") ||
    lower.includes("m.youtube.com")
  ) return "YouTube";

  if (lower.includes("tiktok.com")) return "TikTok";
  if (lower.includes("instagram.com")) return "Instagram";
  if (lower.includes("facebook.com") || lower.includes("fb.watch")) return "Facebook";
  if (lower.includes("x.com") || lower.includes("twitter.com")) return "X";

  return "Unknown";
}

function isVideoLink(link){
  const lower = link.toLowerCase().trim();

  return (
    lower.includes("youtube.com") ||
    lower.includes("youtu.be") ||
    lower.includes("m.youtube.com") ||
    lower.includes("tiktok.com") ||
    lower.includes("instagram.com") ||
    lower.includes("facebook.com") ||
    lower.includes("fb.watch") ||
    lower.includes("x.com") ||
    lower.includes("twitter.com")
  );
}

function convertYouTubeLink(link){
  try{
    const url = new URL(link);
    const host = url.hostname.toLowerCase();
    const path = url.pathname;

    if (host.includes("youtu.be")) {
      const videoId = path.replace(/^\/+/, "").split("/")[0];
      if (videoId) return "https://www.youtube.com/embed/" + videoId;
    }

    if (host.includes("youtube.com") || host.includes("m.youtube.com")) {

      if (path === "/watch") {
        const videoId = url.searchParams.get("v");
        if (videoId) return "https://www.youtube.com/embed/" + videoId;
      }

      if (path.startsWith("/shorts/")) {
        const videoId = path.split("/shorts/")[1].split("/")[0];
        if (videoId) return "https://www.youtube.com/embed/" + videoId;
      }

      if (path.startsWith("/embed/")) {
        const videoId = path.split("/embed/")[1].split("/")[0];
        if (videoId) return "https://www.youtube.com/embed/" + videoId;
      }

      if (path.startsWith("/live/")) {
        const videoId = path.split("/live/")[1].split("/")[0];
        if (videoId) return "https://www.youtube.com/embed/" + videoId;
      }
    }
  } catch(e) {
    return null;
  }

  return null;
}

async function checkClipboardForVideoLink(){
  const pasteBtn = document.getElementById("pasteBtn");
  const status = document.getElementById("status");

  if (!pasteBtn || !navigator.clipboard || !navigator.clipboard.readText) {
    return;
  }

  try{
    const text = (await navigator.clipboard.readText()).trim();

    if (isVideoLink(text)) {
      pasteBtn.disabled = false;
      pasteBtn.classList.add("active");
      pasteBtn.innerText = "Paste link";
      status.innerText = "Video link detected in clipboard.";
    } else {
      pasteBtn.disabled = true;
      pasteBtn.classList.remove("active");
      pasteBtn.innerText = "No video link";
    }
  } catch(err){
    pasteBtn.disabled = true;
    pasteBtn.classList.remove("active");
    pasteBtn.innerText = "Paste";
  }
}

async function pasteVideoLink(){
  const input = document.getElementById("videolink");
  const pasteBtn = document.getElementById("pasteBtn");
  const status = document.getElementById("status");

  if (!navigator.clipboard || !navigator.clipboard.readText) {
    status.innerText = "Clipboard access is not supported in this browser.";
    return;
  }

  try{
    const text = (await navigator.clipboard.readText()).trim();

    if (isVideoLink(text)) {
      input.value = text;
      pasteBtn.innerText = "Pasted";
      pasteBtn.classList.add("active");
      status.innerText = "Video link pasted from clipboard.";
      play();
    } else {
      status.innerText = "Clipboard does not contain a supported video link.";
    }
  } catch(err){
    status.innerText = "Clipboard access was blocked.";
  }
}

function play(){
  const input = document.getElementById("videolink");
  const link = input.value.trim();
  const platform = detectPlatform(link);
  const player = document.getElementById("player");
  const status = document.getElementById("status");

  if (!link) {
    status.innerText = "Paste a link first.";
    player.src = "";
    return;
  }

  if (platform === "YouTube") {
    const embedLink = convertYouTubeLink(link);

    if (embedLink) {
      player.src = embedLink;
      status.innerText = "Platform detected: YouTube";
      return;
    } else {
      status.innerText = "YouTube link detected, but the video ID could not be extracted.";
      player.src = "";
      return;
    }
  }

  player.src = "";
  status.innerHTML =
    'Platform detected: ' + platform +
    ' — direct embed may be blocked. <a href="' + link + '" target="_blank" style="color:#8db7ff;">Open video in new tab</a>';
}

document.addEventListener("DOMContentLoaded", function(){
  const input = document.getElementById("videolink");

  input.addEventListener("keydown", function(e){
    if (e.key === "Enter") {
      play();
    }
  });

  input.addEventListener("focus", function(){
    checkClipboardForVideoLink();
  });

  input.addEventListener("click", function(){
    checkClipboardForVideoLink();
  });
});

const params = new URLSearchParams(window.location.search);
const video = params.get("video");

if (video) {
  const input = document.querySelector("input");
  if (input) {
    input.value = video;
  }
}
</script>

<div class="stzoo-signature">Powered by St.Zoo</div>

</body>
</html>
