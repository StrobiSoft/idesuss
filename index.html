<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Idesüss™ — Főoldal</title>
    <style>
        :root {
            --primary-color: #0d5bd7;
            --bg-color: #f4f7fb;
            --text-color: #17324d;
            --shadow: 0 10px 28px rgba(22, 44, 77, 0.08);
            --glass: rgba(255, 255, 255, 0.9);
        }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg-color); color: var(--text-color); }
        
        .hero-shell { 
            background: linear-gradient(135deg, #0f49d8 0%, #3b82f6 100%); 
            padding: 50px 20px; color: white; text-align: center; 
            border-radius: 0 0 40px 40px;
        }

        .hero-miniapp { 
            background: var(--glass); max-width: 500px; 
            margin: -60px auto 40px; padding: 30px; 
            border-radius: 32px; box-shadow: var(--shadow); 
            backdrop-filter: blur(10px);
        }

        .input { 
            width: 100%; padding: 16px; border: 1px solid #dce7f3; 
            border-radius: 16px; font-size: 16px; outline: none;
            box-sizing: border-box; margin-top: 15px;
        }

        .btn-container { display: flex; gap: 12px; margin-top: 20px; }
        
        .btn { 
            flex: 1; padding: 15px; border-radius: 16px; border: none; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-secondary { background: #e7f0ff; color: var(--primary-color); }

        /* ÚJ VIDEÓ KONTÉNER STÍLUS */
        #videoContainer { 
            display: none; margin-top: 25px; border-radius: 20px; 
            overflow: hidden; background: #000; line-height: 0;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        video { width: 100%; max-height: 500px; }

        footer { text-align: center; padding: 40px 0; color: #94a9c2; font-size: 0.9rem; }
        .stzoo-brand { font-weight: bold; color: var(--primary-color); }
    </style>
</head>
<body>

    <div class="hero-shell">
        <h1 style="font-size: 2.5rem; margin: 0;">Idesüss™</h1>
        <p>Tiszta tartalom, zavaró tényezők nélkül.</p>
    </div>

    <div class="hero-miniapp">
        <h3 style="margin: 0; text-align: center;">Videó kicsomagolása</h3>
        <input type="url" id="videoUrl" class="input" placeholder="Illeszd be a TikTok vagy Insta linket...">
        
        <div class="btn-container">
            <button id="pasteBtn" class="btn btn-secondary">Beillesztés</button>
            <button id="openBtn" class="btn btn-primary">Megnyitás</button>
        </div>

        <div id="statusLabel" style="margin-top: 15px; text-align: center; font-size: 0.85rem; color: #6b7c93;">
            Várjuk a linket...
        </div>

        <div id="videoContainer">
            <video id="customPlayer" controls playsinline></video>
        </div>
    </div>

    <footer>
        Powered by <span class="stzoo-brand">StZoo</span> &copy; 2024 Idesüss™
    </footer>

    <script>
        const videoInput = document.getElementById('videoUrl');
        const statusLabel = document.getElementById('statusLabel');
        const videoContainer = document.getElementById('videoContainer');
        const player = document.getElementById('customPlayer');

        // Beillesztés gomb
        document.getElementById('pasteBtn').onclick = async () => {
            try {
                const text = await navigator.clipboard.readText();
                videoInput.value = text;
                statusLabel.textContent = "Link beillesztve.";
            } catch (err) {
                statusLabel.textContent = "Hiba a beillesztésnél.";
            }
        };

        // KICSOMAGOLÓ FUNKCIÓ
        async function openUrl() {
            const url = videoInput.value.trim();
            if (!url) {
                statusLabel.textContent = "Kérlek, adj meg egy linket!";
                return;
            }

            statusLabel.textContent = "Kicsomagolás... Kérlek várj.";
            statusLabel.style.color = "#0d5bd7";

            try {
                const response = await fetch("https://api.cobalt.tools/api/json", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Accept": "application/json"
                    },
                    body: JSON.stringify({ url: url, videoQuality: "720" })
                });

                const data = await response.json();

                if (data.url) {
                    player.src = data.url;
                    videoContainer.style.display = "block";
                    player.play().catch(() => {
                        statusLabel.textContent = "Kattints a lejátszáshoz!";
                    });
                    statusLabel.textContent = "Siker! Jó szórakozást!";
                    statusLabel.style.color = "#1f9d55";
                    
                    videoContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    throw new Error();
                }
            } catch (error) {
                statusLabel.textContent = "Közvetlen lejátszás nem lehetséges. Megnyitás új lapon...";
                statusLabel.style.color = "#e63946";
                setTimeout(() => { window.open(url, "_blank"); }, 1500);
            }
        }

        document.getElementById('openBtn').onclick = openUrl;
    </script>
</body>
</html>
