<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Idesüss™ — Főoldal</title>
  <meta name="description" content="Az Idesüss egy könnyű webes felület nyilvános videólinkek tisztább, gyorsabb és egyszerűbb megnyitásához." />
  <meta name="theme-color" content="#0d5bd7" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />

  <style>
    /* AZ ÖSSZES EREDETI STÍLUSODAT MEGTARTOTTAM */
    :root {
      --bg: #f4f7fb; --surface: #ffffff; --surface-alt: #eef3f9; --line: #d7e0ea;
      --text: #17324d; --muted: #5e748d; --primary: #0d5bd7; --primary-dark: #0b4cb3;
      --primary-soft: #e7f0ff; --accent: #ffb547; --success: #1f9d55; --warning: #b7791f;
      --danger: #c53030; --shadow: 0 10px 28px rgba(22, 44, 77, 0.08); --radius: 18px;
      --maxw: 1240px; --header-h: 88px; --hero-blue-1: #0f49d8; --hero-blue-2: #3b82f6; --hero-blue-3: #8fd2ff;
    }

    button { font-family: inherit; border: none; cursor: pointer; }

    /* AZ EXTRA GLASS EFFEKTED */
    .btn, button, .install-btn, .open-btn {
      position: relative; padding: 14px 22px; border-radius: 18px;
      font-size: 16px; font-weight: 600; color: white;
      background: linear-gradient(145deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.4), inset 0 -3px 6px rgba(0,0,0,0.4), 0 8px 20px rgba(0,0,0,0.5);
      transition: all 0.2s ease;
    }

    /* ÚJ: VIDEÓ LEJÁTSZÓ KONTÉNER STÍLUSA */
    #videoWrapper {
      display: none;
      margin-top: 20px;
      border-radius: 24px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      border: 4px solid rgba(255,255,255,0.1);
      animation: fadeIn 0.5s ease;
    }
    
    #customPlayer { width: 100%; display: block; max-height: 70vh; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ... Itt marad az összes többi CSS-ed változatlanul ... */
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, sans-serif; background: #f8fbff; }
    .container { width: min(1240px, calc(100% - 32px)); margin: 0 auto; }
    .hero-shell { position: relative; border-radius: 32px; background: linear-gradient(135deg, var(--hero-blue-1), var(--hero-blue-3)); padding: 28px; }
    .hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
    .hero-miniapp { background: rgba(255,255,255,0.84); backdrop-filter: blur(14px); border-radius: 28px; padding: 26px; }
    .input { width: 100%; border-radius: 16px; padding: 16px; border: 1px solid #cfdbe8; margin-bottom: 15px; }
    @media (max-width: 1080px) { .hero-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <!-- HEADER MARAD A RÉGI -->
  <header class="site-header" style="padding: 15px 0; background: white; border-bottom: 1px solid #eee;">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="/favicon.png" width="40" alt="logo">
            <h2 style="margin: 0;">Idesüss™</h2>
        </div>
        <div id="headerClock" style="font-weight: bold;">00:00</div>
    </div>
  </header>

  <main>
    <section class="hero" style="padding: 40px 0;">
      <div class="container">
        <div class="hero-shell">
          <div class="hero-grid">
            <div class="hero-copy" style="color: white;">
              <h1 style="font-size: 3rem; margin: 0;">Idesüss™</h1>
              <p style="font-size: 1.2rem; opacity: 0.9;">A webappod új, modern kapuja.</p>
              <button id="pwaActionBtn" class="btn" style="background: #1f64ff; width: fit-content; margin-top: 20px;">Webapp telepítése</button>
            </div>

            <div class="hero-miniapp">
              <h3 id="miniappTitle">Videó kicsomagoló</h3>
              <input id="videoUrl" class="input" type="url" placeholder="https://tiktok.com/..." />
              
              <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button id="pasteBtn" style="background: #eee; color: #333;">Beillesztés</button>
                <button id="openBtn" style="background: var(--primary);">Megnyitás</button>
                <button id="clearBtn" style="background: #eee; color: #333;">Törlés</button>
              </div>

              <!-- ÚJ VIDEÓ KONTÉNER -->
              <div id="videoWrapper">
                <video id="customPlayer" controls playsinline></video>
              </div>

              <div id="statusLabel" style="margin-top: 15px; font-weight: bold; font-size: 0.9rem; color: var(--muted);">
                Vágólap ellenőrzése...
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const APP_URL = "https://idesuss.net/app";
    const statusLabel = document.getElementById('statusLabel');
    const pwaBtn = document.getElementById('pwaActionBtn');
    const videoUrlInput = document.getElementById('videoUrl');
    const player = document.getElementById('customPlayer');
    const videoWrapper = document.getElementById('videoWrapper');

    // 1. PWA OKOS GOMB LOGIKA
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    
    if (isStandalone) {
      pwaBtn.innerText = "Webapp megnyitása";
      pwaBtn.onclick = () => window.location.href = APP_URL;
    } else {
      pwaBtn.innerText = "Webapp telepítése";
      pwaBtn.onclick = () => {
        statusLabel.textContent = "Átirányítás a telepítéshez...";
        setTimeout(() => window.location.href = APP_URL, 800);
      };
    }

    // 2. VIDEÓ KICSOMAGOLÓ MOTOR (COBALT)
    async function openUrl() {
        const url = videoUrlInput.value.trim();
        if (!url) return;

        statusLabel.textContent = "Keresés a szerveren... (bejelentkezés nélkül)";
        statusLabel.style.color = "var(--primary)";
        videoWrapper.style.display = "none";

        try {
            const response = await fetch("https://api.cobalt.tools/api/json", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Accept": "application/json" },
                body: JSON.stringify({ url: url, videoQuality: "720", downloadMode: "video" })
            });

            const data = await response.json();

            if (data.url) {
                player.src = data.url;
                videoWrapper.style.display = "block";
                player.load();
                player.play();
                statusLabel.textContent = "Siker! Jó szórakozást!";
                statusLabel.style.color = "var(--success)";
                videoWrapper.scrollIntoView({ behavior: 'smooth' });
            } else {
                throw new Error();
            }
        } catch (e) {
            statusLabel.textContent = "A platform tiltja a beágyazást. Megnyitás új lapon...";
            statusLabel.style.color = "var(--danger)";
            setTimeout(() => window.open(url, "_blank"), 1500);
        }
    }

    // 3. ESEMÉNYKEZELŐK
    document.getElementById('openBtn').onclick = openUrl;
    document.getElementById('clearBtn').onclick = () => {
        videoUrlInput.value = "";
        videoWrapper.style.display = "none";
        statusLabel.textContent = "Mező törölve.";
    };
    document.getElementById('pasteBtn').onclick = async () => {
        try {
            const text = await navigator.clipboard.readText();
            videoUrlInput.value = text;
            statusLabel.textContent = "Link beillesztve!";
        } catch {
            statusLabel.textContent = "Nincs hozzáférés a vágólaphoz.";
        }
    };

    // ÓRA FRISSÍTÉSE
    setInterval(() => {
        const now = new Date();
        document.getElementById('headerClock').textContent = 
            now.getHours().toString().padStart(2, '0') + ":" + 
            now.getMinutes().toString().padStart(2, '0');
    }, 1000);

    // EREDETI YEAR ÉS EGYÉB LOGIKÁK MEGTARTVA...
    console.log("Idesüss Engine v2.0 Loaded (Powered by StZoo)");
  </script>
</body>
</html>
