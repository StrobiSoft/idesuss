<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Idesüss App</title>
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    :root{
      --bg1:#08111f; --bg2:#0f172a;
      --panel:rgba(255,255,255,0.05);
      --panel-border:rgba(255,255,255,0.08);
      --text:#eef4ff; --muted:#a4b1c8;
      --accent1:#38bdf8; --accent2:#0ea5e9;
      --danger:#cf4a4a;
      --safe-top: env(safe-area-inset-top, 0px);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0; padding:0; min-height:100%; width: 100%;
      overflow-x: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      color:var(--text);
      background: linear-gradient(155deg,var(--bg1),var(--bg2));
    }

    body{ padding: calc(15px + var(--safe-top)) 15px 20px; }

    .app{
      max-width:700px; margin:0 auto;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
      border-radius:28px;
      padding:16px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--panel-border);
      border-radius:22px;
      padding:18px;
      margin-bottom: 16px;
      width: 100%;
    }

    .brand{ font-size:1.6rem; font-weight:800; margin:0 0 5px; text-align:center; }
    .tagline{ color:var(--muted); font-size:0.9rem; text-align:center; margin-bottom:15px; }

    textarea{
      width:100%; min-height:80px;
      border-radius:15px; padding:14px;
      background:rgba(255,255,255,.06);
      color:var(--text); border:1px solid rgba(255,255,255,.1);
      font-size:1rem; outline:none; resize: none;
    }

    .btn-play{
      width:100%; border:none; border-radius:15px;
      padding:15px; background:linear-gradient(135deg,var(--accent1),var(--accent2));
      color:white; font-weight:800; font-size:1.1rem;
      margin-top:12px; cursor:pointer;
    }

    .player-shell{
      width:100%; aspect-ratio:16/9;
      background:#000; border-radius:15px;
      overflow:hidden; border:1px solid rgba(255,255,255,.1);
      display: flex; align-items: center; justify-content: center;
    }

    iframe{ width:100%; height:100%; border:none; }

    .status{ margin-top:10px; font-size: 0.85rem; text-align: center; min-height: 1.2em; }
  </style>
</head>
<body>

  <div class="app">
    <h1 class="brand">Idesüss App</h1>
    <p class="tagline">Beillesztés és Lejátszás</p>

    <div class="card">
      <textarea id="videoURL" placeholder="Illeszd be a YouTube, Twitch vagy TikTok linket..."></textarea>
      <button class="btn-play" id="playBtn">Indítás</button>
      <div class="status" id="status"></div>
    </div>

    <div class="card">
      <div class="player-shell" id="player">
        <div style="color:var(--muted); padding:20px; text-align:center;">Várakozás linkre...</div>
      </div>
    </div>
  </div>

  <script>
    const videoURL = document.getElementById("videoURL");
    const playBtn = document.getElementById("playBtn");
    const player = document.getElementById("player");
    const statusBox = document.getElementById("status");

    function setStatus(text, color) {
      statusBox.textContent = text;
      statusBox.style.color = color || "var(--accent1)";
    }

    function loadVideo() {
      const url = videoURL.value.trim();
      if (!url) { setStatus("Nincs beillesztett link!", "var(--danger)"); return; }

      let embedUrl = "";
      setStatus("Felismerés...", "var(--accent1)");

      try {
        const urlObj = new URL(url);
        const host = urlObj.hostname.toLowerCase();

        // 1. YouTube Felismerés
        if (host.includes("youtube.com") || host.includes("youtu.be")) {
          let videoId = "";
          if (host.includes("youtu.be")) {
            videoId = urlObj.pathname.substring(1);
          } else if (urlObj.pathname.includes("shorts")) {
            videoId = urlObj.pathname.split("/").pop();
          } else {
            videoId = urlObj.searchParams.get("v");
          }
          if(videoId) embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
        } 
        
        // 2. Twitch Felismerés
        else if (host.includes("twitch.tv")) {
          const channel = urlObj.pathname.substring(1).split("/")[0];
          if(channel) embedUrl = `https://player.twitch.tv/?channel=${channel}&parent=${window.location.hostname}&autoplay=true`;
        }

        // 3. TikTok Felismerés
        else if (host.includes("tiktok.com")) {
          const videoId = urlObj.pathname.split("/video/")[1]?.split("?")[0];
          if(videoId) embedUrl = `https://www.tiktok.com/embed/v2/${videoId}`;
        }

        // 4. Facebook Felismerés
        else if (host.includes("facebook.com")) {
          embedUrl = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}&show_text=0`;
        }

        // Megjelenítés
        if (embedUrl) {
          player.innerHTML = `<iframe src="${embedUrl}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
          setStatus("Lejátszás elindítva!", "#baf7cf");
        } else {
          player.innerHTML = `<div style="padding:20px; text-align:center;"><a href="${url}" target="_blank" style="color:var(--accent1); text-decoration:none;">Ezt a linket csak külső lapon tudod megnyitni ➔</a></div>`;
          setStatus("Közvetlen lejátszás nem lehetséges.", "var(--muted)");
        }

      } catch (e) {
        setStatus("Érvénytelen URL formátum!", "var(--danger)");
      }
    }

    playBtn.addEventListener("click", loadVideo);

    // Kényelmi funkció: Enter leütésére is indul
    videoURL.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        loadVideo();
      }
    });
  </script>

</body>
</html>
