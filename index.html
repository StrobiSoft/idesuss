<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idesüss Video Viewer</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(180deg,#0f1117,#171b26);
color:white;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.app{
width:100%;
max-width:900px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
border-radius:20px;
padding:24px;
box-shadow:0 20px 50px rgba(0,0,0,0.35);
backdrop-filter:blur(8px);
}

h1{
margin:0 0 8px 0;
font-size:clamp(28px,4vw,42px);
text-align:center;
}

.subtitle{
margin:0 0 24px 0;
text-align:center;
color:#c7cede;
font-size:15px;
}

.controls{
display:flex;
gap:12px;
align-items:center;
margin-bottom:18px;
}

input{
flex:1;
padding:14px 16px;
font-size:16px;
border:none;
border-radius:12px;
outline:none;
background:white;
color:#111;
}

button{
padding:14px 20px;
font-size:16px;
font-weight:bold;
border:none;
border-radius:12px;
cursor:pointer;
background:#5b8cff;
color:white;
transition:transform 0.15s ease, opacity 0.15s ease;
}

button:hover{
transform:translateY(-1px);
opacity:0.95;
}

.status{
min-height:24px;
margin:0 0 18px 0;
color:#d3d9e6;
font-size:14px;
}

.player-wrap{
width:100%;
aspect-ratio:16 / 9;
background:#0b0d12;
border-radius:16px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.06);
}

iframe{
width:100%;
height:100%;
border:none;
display:block;
background:#0b0d12;
}

.tip{
margin-top:16px;
font-size:13px;
color:#98a2b3;
text-align:center;
line-height:1.5;
}

.tip code{
background:rgba(255,255,255,0.08);
padding:2px 6px;
border-radius:6px;
}

@media (max-width:700px){
.app{
padding:18px;
border-radius:16px;
}

.controls{
flex-direction:column;
}

button{
width:100%;
}

input{
width:100%;
}
}
</style>
</head>

<body>

<div class="app">
<h1>Idesüss Video Viewer</h1>
<p class="subtitle">Watch Without Login</p>

<div class="controls">
<input id="videolink" placeholder="Paste video link here">
<button onclick="play()">Play</button>
</div>

<p id="status" class="status"></p>

<div class="player-wrap">
<iframe id="player" allowfullscreen></iframe>
</div>

<p class="tip">
YouTube linkek beágyazva mennek. Más platformoknál, ha az embed tiltott,
az oldal új lapon nyitási linket ad.
</p>
</div>

<script>
function detectPlatform(link){
link = link.toLowerCase();

if(link.includes("youtube.com") || link.includes("youtu.be")) return "YouTube";
if(link.includes("tiktok.com")) return "TikTok";
if(link.includes("instagram.com")) return "Instagram";
if(link.includes("facebook.com") || link.includes("fb.watch")) return "Facebook";
if(link.includes("x.com") || link.includes("twitter.com")) return "X";
return "Unknown";
}

function convertYouTubeLink(link){
if(link.includes("youtube.com/watch?v=")){
let videoId = link.split("watch?v=")[1].split("&")[0];
return "https://www.youtube.com/embed/" + videoId;
}

if(link.includes("youtu.be/")){
let videoId = link.split("youtu.be/")[1].split("?")[0];
return "https://www.youtube.com/embed/" + videoId;
}

if(link.includes("youtube.com/embed/")){
return link;
}

return null;
}

function play(){
let input = document.getElementById("videolink");
let link = input.value.trim();
let platform = detectPlatform(link);
let player = document.getElementById("player");
let status = document.getElementById("status");

if(!link){
status.innerText = "Paste a link first.";
player.src = "";
return;
}

if(platform === "YouTube"){
let embedLink = convertYouTubeLink(link);

if(embedLink){
player.src = embedLink;
status.innerText = "Platform detected: YouTube";
return;
}
}

player.src = "";
status.innerHTML =
'Platform detected: ' + platform +
' — direct embed may be blocked. <a href="' + link + '" target="_blank" style="color:#8db7ff;">Open video in new tab</a>';
}

document.addEventListener("DOMContentLoaded", function(){
let input = document.getElementById("videolink");
input.addEventListener("keydown", function(e){
if(e.key === "Enter"){
play();
}
});
});
const params = new URLSearchParams(window.location.search);
const video = params.get("video");

if (video) {
  const input = document.querySelector("input");
  if (input) {
    input.value = video;
  }
}  
</script>
 <div class="stzoo-signature">Powered by St.Zoo</div>

<style>
.stzoo-signature{
position:fixed;
bottom:6px;
right:10px;
font-size:10px;
color:rgba(120,120,120,0.6);
font-family:system-ui,sans-serif;
pointer-events:none;
user-select:none;
}
</style>

</body>
</html> 
</body>
</html>
