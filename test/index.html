<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Supabase Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: white;
    }

    #posts {
      display: grid;
      gap: 16px;
    }

    .debug {
      font-family: monospace;
      font-size: 16px;
      margin: 6px 0;
    }

    .card {
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
  </style>
</head>
<body>
<div style="padding:20px;">
  <input id="newPost" placeholder="Írj valamit..."
    style="width:70%;padding:10px;border-radius:10px;border:none;">
    
  <button onclick="addPost()"
    style="padding:10px 16px;border-radius:10px;border:none;background:#0d5bd7;color:white;">
    Küldés
  </button>
</div>
<div id="posts"></div>

<script>
const container = document.getElementById("posts");

function debug(msg, color = "white") {
  const p = document.createElement("div");
  p.style.color = color;
  p.style.fontFamily = "monospace";
  p.style.margin = "8px 0";
  p.textContent = msg;
  container.appendChild(p);
}

const SUPABASE_URL = "https://nakayuciurazdacgyoxu.supabase.co";
const SUPABASE_KEY = "IDE_JÖN_A_TE_TELJES_SB_PUBLISHABLE_KULCSOD";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadPosts() {
  container.innerHTML = "";

  debug("1. Script elindult", "lightgreen");
  debug("2. URL beállítva", "cyan");
  debug("3. Key beállítva", "cyan");
  debug("4. Supabase kliens létrejött", "yellow");
  debug("5. Lekérés indul...", "orange");

  const { data, error } = await supabase
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    debug("SUPABASE HIBA: " + error.message, "red");
    return;
  }

  debug("6. Lekért rekordok száma: " + data.length, "lightgreen");

  data.forEach(post => {
    const card = document.createElement("div");
    card.style.background = "rgba(255,255,255,0.08)";
    card.style.borderRadius = "14px";
    card.style.padding = "12px";
    card.style.margin = "10px 0";
    card.style.boxShadow = "0 10px 30px rgba(0,0,0,0.25)";

    const date = post.created_at
      ? new Date(post.created_at).toLocaleString("hu-HU")
      : "Nincs dátum";

    card.innerHTML = `
      <div style="font-size:12px; opacity:.7; margin-bottom:8px;">
        ${date}
      </div>
      <div style="font-size:18px; font-weight:700;">
        ${post.text || "Nincs szöveg"}
      </div>
    `;

    container.appendChild(card);
  });
}

async function addPost() {
  const input = document.getElementById("newPost");
  const text = input.value.trim();

  if (!text) {
    alert("Írj be valamit.");
    return;
  }

  const { error } = await supabase
    .from("posts")
    .insert([{ text }]);

  if (error) {
    alert("Insert hiba: " + error.message);
    return;
  }

  input.value = "";
  await loadPosts();
}

window.addPost = addPost;

loadPosts();
</script>

</body>
</html>
