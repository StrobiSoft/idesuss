<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Idesüss Test</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: white;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding-top: 70px;
    }

    .panel {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
    }

    h2 {
      margin: 0;
      font-size: 18px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      flex: 1;
      min-width: 220px;
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
    }

    input[type="hidden"] {
      display: none;
    }

    button {
      padding: 12px 18px;
      border-radius: 12px;
      border: none;
      background: #0d5bd7;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary { background: #475569; }
    button.register { background: #16a34a; }
    button.warning { background: #7c3aed; }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .hidden { display: none; }

    .muted {
      opacity: 0.8;
      font-size: 14px;
      line-height: 1.45;
    }

    .big-actions,
    .auth-footer {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .error-box {
      margin-top: 10px;
      color: #fecaca;
      font-size: 14px;
      min-height: 20px;
    }

    .success-box {
      margin-top: 10px;
      color: #bbf7d0;
      font-size: 14px;
      min-height: 20px;
    }

    .consent-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 12px 0 4px;
    }

    .consent-row input[type="checkbox"] {
      margin-top: 3px;
      transform: scale(1.15);
      flex: 0 0 auto;
    }
        .consent-row label {
      font-size: 14px;
      opacity: 0.95;
      line-height: 1.45;
    }

    .avatar-circle {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.10);
  font-size: 28px;
  overflow: hidden;
  flex: 0 0 auto;
}

.avatar-circle img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
  display: block;
}

    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .avatar-btn {
      height: 48px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      font-size: 24px;
      cursor: pointer;
    }

    .avatar-btn.selected {
      border: 2px solid #93c5fd;
    }

    .avatar-actions {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }

    .menu-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 1000;
    }

    .side-menu {
      position: fixed;
      left: 0;
      top: 0;
      width: 260px;
      height: 100%;
      background: #020617;
      padding: 20px;
      z-index: 900;
    }

    .menu-item {
      width: 100%;
      margin-bottom: 10px;
    }

    .welcome-title {
      margin-left: 80px;
    }
    .profile-title-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.profile-title-name {
  font-size: 18px;
  font-weight: 700;
}

#profileAvatarGrid {
  display: none;
}
.toast {
  position: fixed;
  left: 50%;
  bottom: 24px;
  transform: translateX(-50%) translateY(20px);
  min-width: 220px;
  max-width: calc(100vw - 32px);
  padding: 12px 16px;
  border-radius: 12px;
  color: white;
  font-size: 14px;
  font-weight: 700;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease, transform 0.25s ease;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.toast.success { background: #166534; }
.toast.error { background: #991b1b; }
.toast.info { background: #1d4ed8; }
.crop-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.78);
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px;
}

.crop-box {
  width: min(92vw, 420px);
  background: #020617;
  border-radius: 18px;
  padding: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.55);
}

.crop-box h3 {
  margin: 0 0 12px;
}

.crop-image-wrap {
  width: 100%;
  height: 320px;
  background: rgba(255,255,255,0.08);
  overflow: hidden;
  border-radius: 14px;
}

#cropModalImage {
  max-width: 100%;
  display: block;
}

.crop-modal.hidden {
  display: none;
}  
  </style>
</head>

            <div id="registerView" class="hidden">

        <div id="registerAvatarGrid" class="avatar-grid"></div>

        <div class="consent-row">

        <div class="auth-footer">

        <div class="error-box" id="registerError"></div>
        <div class="success-box" id="registerSuccess"></div>
      </div>

      <div id="resetView" class="hidden">
        <h2>Új jelszó</h2>

        <div class="row">
          <input id="resetPassword1" type="password" placeholder="Új jelszó">

        </div>

        <div class="auth-footer">
          <button id="resetSaveBtn" class="warning">Mentés</button>
          <button id="backFromResetBtn" class="secondary">Vissza</button>
        </div>

        <div id="resetError" class="error-box"></div>
        <div id="resetSuccess" class="success-box"></div>
      </div>

      <div class="muted" id="authInfo">Nincs bejelentkezett user.</div>

      <div class="auth-footer">
        <button id="logoutBtn" class="secondary">Kilépés</button>
      </div>
    </div>

    <!-- PROFILE PANEL -->
<div id="profilePanel" class="panel hidden">
  <div class="profile-title-row">

  <div class="muted">Válassz alap avatart:</div>

    <button id="saveProfileBtn" class="register">Profil mentése</button>
  </div>
</div>

    <!-- POST -->
    <div class="panel">
      <div class="row">

    <!-- STATUS -->

  </div>

  <div id="toast" class="toast"></div>

    </div>
  </div>
