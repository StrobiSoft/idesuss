<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Supabase Auth Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: white;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
    }

    .panel {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      flex: 1;
      min-width: 220px;
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 12px 18px;
      border-radius: 12px;
      border: none;
      background: #0d5bd7;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #475569;
    }

    button.register {
      background: #16a34a;
    }

    button.warning {
      background: #7c3aed;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .big-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }

    .muted {
      opacity: 0.8;
      font-size: 14px;
      line-height: 1.45;
    }

    .status {
      font-family: monospace;
      font-size: 14px;
      white-space: pre-line;
      opacity: 0.95;
    }

    .error-box {
      margin-top: 10px;
      color: #fecaca;
      font-size: 14px;
      min-height: 20px;
    }

    .success-box {
      margin-top: 10px;
      color: #bbf7d0;
      font-size: 14px;
      min-height: 20px;
    }

    .consent-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 12px 0 4px;
    }

    .consent-row input[type="checkbox"] {
      margin-top: 3px;
      transform: scale(1.15);
      flex: 0 0 auto;
    }

    .consent-row label {
      font-size: 14px;
      opacity: 0.95;
      line-height: 1.45;
    }

    a {
      color: #93c5fd;
      text-decoration: underline;
    }

    #posts {
      display: grid;
      gap: 16px;
      margin-top: 16px;
    }

    .card {
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .date {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 8px;
    }

    .author {
      font-size: 12px;
      opacity: 0.75;
      margin-bottom: 8px;
    }

    .text {
      font-size: 18px;
      font-weight: 700;
      word-break: break-word;
    }

    .auth-footer {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>/test – auth + consent + posts</h1>

    <div class="panel">
      <div id="authChoiceView">
        <h2>Folytatás</h2>
        <div class="muted">
          Válaszd ki, hogy már van fiókod, vagy most szeretnél regisztrálni.
        </div>

        <div class="big-actions">
          <button id="showLoginBtn">Van már fiókom</button>
          <button id="showRegisterBtn" class="register">Új vagyok itt</button>
        </div>
      </div>

      <div id="loginView" class="hidden">
        <h2>Belépés</h2>

        <div class="row" style="margin-bottom:10px;">
          <input id="loginEmail" type="email" placeholder="Email cím">
          <input id="loginPassword" type="password" placeholder="Jelszó">
        </div>

        <div class="auth-footer">
          <button id="loginBtn">Belépés</button>
          <button id="backFromLoginBtn" class="secondary">Vissza</button>
          <button id="forgotBtn" class="warning">Elfelejtett jelszó</button>
        </div>

        <div class="error-box" id="loginError"></div>
        <div class="success-box" id="loginSuccess"></div>
      </div>

      <div id="registerView" class="hidden">
        <h2>Regisztráció</h2>

        <div class="row" style="margin-bottom:10px;">
          <input id="registerEmail" type="email" placeholder="Email cím">
          <input id="registerPassword" type="password" placeholder="Jelszó">
        </div>

        <div class="row" style="margin-bottom:10px;">
          <input id="registerPassword2" type="password" placeholder="Jelszó megerősítése">
        </div>

        <div class="consent-row">
          <input id="consentCheckbox" type="checkbox">
          <label for="consentCheckbox">
            Elolvastam és elfogadom a
            <a href="/privacy.html" target="_blank" rel="noopener noreferrer">Privacy Policy</a>
            és a
            <a href="/terms.html" target="_blank" rel="noopener noreferrer">Felhasználási feltételek</a>
            tartalmát.
          </label>
        </div>

        <div class="auth-footer">
          <button id="registerBtn" class="register">Regisztráció</button>
          <button id="backFromRegisterBtn" class="secondary">Vissza</button>
        </div>

        <div class="error-box" id="registerError"></div>
        <div class="success-box" id="registerSuccess"></div>
      </div>

      <hr style="border:none;height:1px;background:rgba(255,255,255,0.12);margin:18px 0;">

      <div class="muted" id="authInfo">Nincs bejelentkezett user.</div>
      <div class="auth-footer">
        <button id="logoutBtn" class="secondary">Kilépés</button>
      </div>
    </div>

    <div class="panel">
      <div class="row">
        <input id="newPost" type="text" placeholder="Írj valamit..." disabled>
        <button id="sendBtn" disabled>Küldés</button>
      </div>
      <div class="muted" style="margin-top:10px;">
        Posztolni csak bejelentkezés után lehet.
      </div>
    </div>

    <div class="panel">
      <div class="status" id="status"></div>
    </div>

    <div id="posts"></div>
  </div>

  <script>
      const SUPABASE_URL = "https://nakayuciurazdacgyoxu.supabase.co";
    const SUPABASE_KEY = "sb_publishable_N22j5vRDgiqKXasUbQT1dQ_KOyq6cfG";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const authChoiceView = document.getElementById("authChoiceView");
    const loginView = document.getElementById("loginView");
    const registerView = document.getElementById("registerView");

    const showLoginBtn = document.getElementById("showLoginBtn");
    const showRegisterBtn = document.getElementById("showRegisterBtn");
    const backFromLoginBtn = document.getElementById("backFromLoginBtn");
    const backFromRegisterBtn = document.getElementById("backFromRegisterBtn");

    const loginEmail = document.getElementById("loginEmail");
    const loginPassword = document.getElementById("loginPassword");
    const loginBtn = document.getElementById("loginBtn");
    const forgotBtn = document.getElementById("forgotBtn");

    const registerEmail = document.getElementById("registerEmail");
    const registerPassword = document.getElementById("registerPassword");
    const registerPassword2 = document.getElementById("registerPassword2");
    const registerBtn = document.getElementById("registerBtn");
    const consentCheckbox = document.getElementById("consentCheckbox");

    const loginError = document.getElementById("loginError");
    const loginSuccess = document.getElementById("loginSuccess");
    const registerError = document.getElementById("registerError");
    const registerSuccess = document.getElementById("registerSuccess");

    const logoutBtn = document.getElementById("logoutBtn");
    const authInfo = document.getElementById("authInfo");

    const newPostInput = document.getElementById("newPost");
    const sendBtn = document.getElementById("sendBtn");

    const statusBox = document.getElementById("status");
    const postsBox = document.getElementById("posts");

    let currentUser = null;

    function showView(viewName) {
      authChoiceView.classList.add("hidden");
      loginView.classList.add("hidden");
      registerView.classList.add("hidden");

      if (viewName === "choice") authChoiceView.classList.remove("hidden");
      if (viewName === "login") loginView.classList.remove("hidden");
      if (viewName === "register") registerView.classList.remove("hidden");
    }

    function clearMessages() {
      loginError.textContent = "";
      loginSuccess.textContent = "";
      registerError.textContent = "";
      registerSuccess.textContent = "";
    }

    function setStatus(lines) {
      statusBox.textContent = Array.isArray(lines) ? lines.join("\n") : lines;
    }

    function renderAuthState() {
      if (currentUser) {
        authInfo.textContent = "Bejelentkezve: " + (currentUser.email || currentUser.id);
        newPostInput.disabled = false;
        sendBtn.disabled = false;
      } else {
        authInfo.textContent = "Nincs bejelentkezett user.";
        newPostInput.disabled = true;
        sendBtn.disabled = true;
      }
    }

    async function refreshSession() {
      try {
        const { data, error } = await supabaseClient.auth.getUser();
        if (error) {
          currentUser = null;
        } else {
          currentUser = data?.user ?? null;
        }
      } catch {
        currentUser = null;
      }
      renderAuthState();
    }

    async function loadPosts() {
      setStatus([
        "1. Script elindult",
        "2. URL beállítva",
        "3. Key beállítva",
        "4. Supabase kliens létrejött",
        "5. Session ellenőrzés...",
        currentUser ? "6. User: " + (currentUser.email || currentUser.id) : "6. User: nincs",
        "7. Lekérés indul..."
      ]);

      const { data, error } = await supabaseClient
        .from("posts")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        setStatus([
          "1. Script elindult",
          "2. URL beállítva",
          "3. Key beállítva",
          "4. Supabase kliens létrejött",
          "5. Session ellenőrzés...",
          currentUser ? "6. User: " + (currentUser.email || currentUser.id) : "6. User: nincs",
          "7. Lekérés indul...",
          "SUPABASE HIBA: " + error.message
        ]);
        return;
      }

      setStatus([
        "1. Script elindult",
        "2. URL beállítva",
        "3. Key beállítva",
        "4. Supabase kliens létrejött",
        "5. Session ellenőrzés...",
        currentUser ? "6. User: " + (currentUser.email || currentUser.id) : "6. User: nincs",
        "7. Lekérés indul...",
        "8. Lekért rekordok száma: " + data.length
      ]);

      postsBox.innerHTML = "";

      data.forEach(post => {
        const card = document.createElement("div");
        card.className = "card";

        const date = post.created_at
          ? new Date(post.created_at).toLocaleString("hu-HU")
          : "Nincs dátum";

        card.innerHTML = `
          <div class="date">${date}</div>
          <div class="author">user_id: ${post.user_id || "nincs"}</div>
          <div class="text">${post.text || "Nincs szöveg"}</div>
        `;

        postsBox.appendChild(card);
      });
    }
        async function login() {
      clearMessages();

      const email = loginEmail.value.trim();
      const password = loginPassword.value;

      if (!email || !password) {
        loginError.textContent = "Adj meg email címet és jelszót.";
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "Belépés...";

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          loginError.textContent = "Belépési hiba: " + error.message;
          return;
        }

        currentUser = data?.user ?? null;
        loginSuccess.textContent = "Sikeres belépés.";
        await refreshSession();
        await loadPosts();
        showView("choice");
      } catch (err) {
        loginError.textContent = "Hiba: " + err.message;
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Belépés";
      }
    }

    async function register() {
      clearMessages();

      const email = registerEmail.value.trim();
      const password = registerPassword.value;
      const password2 = registerPassword2.value;

      if (!email || !password || !password2) {
        registerError.textContent = "Minden mezőt tölts ki.";
        return;
      }

      if (password !== password2) {
        registerError.textContent = "A két jelszó nem egyezik.";
        return;
      }

      if (!consentCheckbox.checked) {
        registerError.textContent = "A folytatáshoz el kell fogadnod a Privacy Policy és a Felhasználási feltételek tartalmát.";
        return;
      }

      registerBtn.disabled = true;
      registerBtn.textContent = "Regisztráció...";

      try {
        const { error } = await supabaseClient.auth.signUp({
          email,
          password
        });

        if (error) {
          registerError.textContent = "Regisztrációs hiba: " + error.message;
          return;
        }

        registerSuccess.textContent = "Sikeres regisztráció. Most jelentkezz be.";
        showView("login");
        loginEmail.value = email;
        loginPassword.value = "";
      } catch (err) {
        registerError.textContent = "Hiba: " + err.message;
      } finally {
        registerBtn.disabled = false;
        registerBtn.textContent = "Regisztráció";
      }
    }

    async function resetPassword() {
      clearMessages();

      const email = loginEmail.value.trim();

      if (!email) {
        loginError.textContent = "Az elfelejtett jelszóhoz add meg az email címedet.";
        return;
      }

      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: "https://idesuss.net/test/"
      });

      if (error) {
        loginError.textContent = "Jelszó-visszaállítási hiba: " + error.message;
        return;
      }

      loginSuccess.textContent = "Elküldtük a jelszó-visszaállító emailt.";
    }

    async function signOut() {
      clearMessages();

      const { error } = await supabaseClient.auth.signOut();

      if (error) {
        alert("Kilépési hiba: " + error.message);
        return;
      }

      currentUser = null;
      await refreshSession();
      await loadPosts();
      showView("choice");
    }

    async function addPost() {
      const text = newPostInput.value.trim();

      if (!currentUser) {
        alert("Előbb jelentkezz be.");
        return;
      }

      if (!text) {
        alert("Írj be valamit.");
        return;
      }

      sendBtn.disabled = true;
      sendBtn.textContent = "Küldés...";

      const { error } = await supabaseClient
        .from("posts")
        .insert([{
          text,
          user_id: currentUser.id
        }]);

      sendBtn.disabled = false;
      sendBtn.textContent = "Küldés";

      if (error) {
        alert("Insert hiba: " + error.message);
        return;
      }

      newPostInput.value = "";
      await loadPosts();
    }

    showLoginBtn.addEventListener("click", () => {
      clearMessages();
      showView("login");
    });

    showRegisterBtn.addEventListener("click", () => {
      clearMessages();
      showView("register");
    });

    backFromLoginBtn.addEventListener("click", () => {
      clearMessages();
      showView("choice");
    });

    backFromRegisterBtn.addEventListener("click", () => {
      clearMessages();
      showView("choice");
    });

    loginBtn.addEventListener("click", login);
    registerBtn.addEventListener("click", register);
    forgotBtn.addEventListener("click", resetPassword);
    logoutBtn.addEventListener("click", signOut);
    sendBtn.addEventListener("click", addPost);

    newPostInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addPost();
    });

    supabaseClient.auth.onAuthStateChange(async () => {
      await refreshSession();
      await loadPosts();
    });

    (async function init() {
      showView("choice");
      await refreshSession();
      await loadPosts();
    })();
  </script>
</body>
</html>
