<style>
.comments {
  margin-top:12px;
  padding-left:10px;
  border-left:2px solid rgba(255,255,255,0.1);
}

.comment {
  margin-top:10px;
  padding:10px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
}

.comment-head {
  display:flex;
  gap:8px;
  align-items:center;
  margin-bottom:4px;
}

.comment-avatar {
  font-size:18px;
}

.comment-name {
  font-weight:600;
  font-size:14px;
}

.comment-text {
  font-size:14px;
}

.comment-input {
  margin-top:10px;
  display:flex;
  gap:6px;
}

.comment-input input {
  flex:1;
  padding:8px;
  border-radius:8px;
  border:none;
}
</style>

<script>
async function loadComments(postId, container){

  const { data, error } = await supabase
    .from("comments")
    .select(`
      *,
      profiles (
        nickname,
        avatar_emoji
      )
    `)
    .eq("post_id", postId)
    .order("created_at",{ ascending:true });

  if(error){
    console.error(error);
    return;
  }

  container.innerHTML = "";

  (data || []).forEach(c => {

    const profile = Array.isArray(c.profiles)
      ? c.profiles[0]
      : c.profiles || {};

    const nick = profile.nickname || "Névtelen";
    const avatar = profile.avatar_emoji || "🙂";

    const div = document.createElement("div");
    div.className = "comment";

    div.innerHTML = `
      <div class="comment-head">
        <div class="comment-avatar">${escapeHtml(avatar)}</div>
        <div class="comment-name">${escapeHtml(nick)}</div>
      </div>
      <div class="comment-text">${escapeHtml(c.text)}</div>
    `;

    container.appendChild(div);
  });
}
<!-- 2/3 -->
async function addComment(postId, input, container){
  const text = input.value.trim();

  if(!text){
    showToast("Üres komment? Azért ennyire nem lehetünk titokzatosak 😏","error");
    return;
  }

  const { data:authData, error:authError } = await supabase.auth.getUser();

  if(authError || !authData?.user){
    showToast("Kommenteléshez be kell jelentkezni 🙂","error");
    return;
  }

  const { error } = await supabase
    .from("comments")
    .insert([{
      post_id: postId,
      user_id: authData.user.id,
      text
    }]);

  if(error){
    console.error(error);
    showToast("A komment most elszökött valahova 😬","error");
    return;
  }

  input.value = "";
  showToast("Komment elküldve ✍️","success");
  await loadComments(postId, container);
}

const originalLoadPosts = loadPosts;

loadPosts = async function(){

  const { data, error } = await supabase
    .from("posts")
    .select(`
      *,
      profiles (
        nickname,
        avatar_emoji,
        avatar_url
      )
    `)
    .order("created_at",{ ascending:false });

  if(error){
    console.error(error);
    setStatus("SUPABASE HIBA: " + error.message);
    return;
  }

  setStatus([
    "1. Script elindult",
    "2. URL beállítva",
    "3. Key beállítva",
    "4. Supabase kliens létrejött",
    "5. Session ellenőrzés...",
    user ? "6. User: " + (user.email || user.id) : "6. User: nincs",
    "7. Lekérés indul...",
    "8. Lekért rekordok száma: " + (data?.length || 0)
  ]);

  const postsBox = document.getElementById("posts");
  postsBox.innerHTML = "";

  (data || []).forEach(post => {

    const profile = Array.isArray(post.profiles)
      ? post.profiles[0]
      : post.profiles || {};

    const nick = profile.nickname || "Névtelen";
    const avatar = profile.avatar_emoji || "🙂";

    const date = post.created_at
      ? new Date(post.created_at).toLocaleString("hu-HU")
      : "Nincs dátum";

    const card = document.createElement("div");
    card.className = "card";

    const commentsWrap = document.createElement("div");
    commentsWrap.className = "comments";

    const commentInputWrap = document.createElement("div");
    commentInputWrap.className = "comment-input";

    const commentInput = document.createElement("input");
    commentInput.placeholder = user
      ? "Írj kommentet..."
      : "Kommenteléshez jelentkezz be...";
    commentInput.disabled = !user;

    const commentBtn = document.createElement("button");
    commentBtn.textContent = "Komment";
    commentBtn.disabled = !user;

    commentBtn.addEventListener("click", async () => {
      await addComment(post.id, commentInput, commentsWrap);
    });

    commentInput.addEventListener("keydown", async (e) => {
      if(e.key === "Enter"){
        await addComment(post.id, commentInput, commentsWrap);
      }
    });

    commentInputWrap.appendChild(commentInput);
    commentInputWrap.appendChild(commentBtn);

    card.innerHTML = `
      <div class="post-head">
        <div class="avatar-circle">${escapeHtml(avatar)}</div>
        <div>
          <div class="post-name">${escapeHtml(nick)}</div>
          <div class="post-date">${escapeHtml(date)}</div>
        </div>
      </div>
      <div class="post-text">${escapeHtml(post.text || "")}</div>
    `;

    card.appendChild(commentInputWrap);
    card.appendChild(commentsWrap);
    postsBox.appendChild(card);

    loadComments(post.id, commentsWrap);
  });
}

});

function isRecoveryMode(){
  const hash = window.location.hash || "";
  const search = window.location.search || "";
  return hash.includes("type=recovery") || search.includes("type=recovery");
}

function isSignupConfirmMode(){
  const hash = window.location.hash || "";
  const search = window.location.search || "";
  return hash.includes("type=signup") || search.includes("type=signup");
}

(async ()=>{
  showView("choice");
  await refreshSession();

  if(isRecoveryMode()){
    showView("reset");
    showToast("Adj meg új jelszót 🔐","info");
  } else if(isSignupConfirmMode()){
    showToast("Email megerősítve ✔","success");
    showView("login");
  }

  if(user){
    await loadOwnProfile();
  }

  await loadPosts();
})();
</script>
