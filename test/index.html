<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Idesüss Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: white;

    .wrap {
  max-width: 960px;
  margin: 0 auto;
  padding-top: 70px; /* 👈 EZ AZ ÚJ */
}

    .panel {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"],
    input[type="url"] {
      flex: 1;
      min-width: 220px;
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 12px 18px;
      border-radius: 12px;
      border: none;
      background: #0d5bd7;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #475569;
    }

    button.register {
      background: #16a34a;
    }

    button.warning {
      background: #7c3aed;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .big-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }

    .muted {
      opacity: 0.8;
      font-size: 14px;
      line-height: 1.45;
    }

    .status {
      font-family: monospace;
      font-size: 14px;
      white-space: pre-line;
      opacity: 0.95;
    }

    .error-box {
      margin-top: 10px;
      color: #fecaca;
      font-size: 14px;
      min-height: 20px;
    }

    .success-box {
      margin-top: 10px;
      color: #bbf7d0;
      font-size: 14px;
      min-height: 20px;
    }
        .consent-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 12px 0 4px;
    }

    .consent-row input[type="checkbox"] {
      margin-top: 3px;
      transform: scale(1.15);
      flex: 0 0 auto;
    }

    .consent-row label {
      font-size: 14px;
      opacity: 0.95;
      line-height: 1.45;
    }

    .auth-footer {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    a {
      color: #93c5fd;
      text-decoration: underline;
    }

    #posts {
      display: grid;
      gap: 16px;
      margin-top: 16px;
    }

    .card {
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .post-head,
    .comment-head,
    .profile-preview {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .post-head {
      margin-bottom: 10px;
    }

    .post-name,
    .comment-name {
      font-weight: 700;
    }

    .post-date,
    .comment-date {
      font-size: 12px;
      opacity: 0.7;
    }

    .post-text {
      font-size: 18px;
      font-weight: 700;
      word-break: break-word;
      margin-bottom: 12px;
    }

    .avatar-circle,
    .comment-avatar-circle {
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .avatar-circle {
      width: 52px;
      height: 52px;
      font-size: 28px;
    }

    .comment-avatar-circle {
      width: 34px;
      height: 34px;
      font-size: 18px;
    }

    .avatar-circle img,
    .comment-avatar-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
        .avatar-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(44px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .avatar-btn {
      height: 48px;
      border-radius: 12px;
      border: 2px solid transparent;
      background: rgba(255,255,255,0.08);
      font-size: 24px;
      cursor: pointer;
      padding: 0;
    }

    .avatar-btn.selected {
      border-color: #93c5fd;
      background: rgba(59,130,246,0.18);
    }

    .profile-preview {
      margin-top: 12px;
      margin-bottom: 10px;
    }

    .profile-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .comments {
      margin-top: 12px;
      padding-left: 10px;
      border-left: 2px solid rgba(255,255,255,0.1);
      display: grid;
      gap: 10px;
    }

    .comment {
      padding: 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
    }

    .comment-text {
      font-size: 14px;
      margin-top: 6px;
      word-break: break-word;
    }

    .comment-input {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .comment-input input {
      flex: 1;
      min-width: 180px;
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(20px);
      min-width: 220px;
      max-width: calc(100vw - 32px);
      padding: 12px 16px;
      border-radius: 12px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success { background: #166534; }
    .toast.error { background: #991b1b; }
    .toast.info { background: #1d4ed8; }
    
    
  .menu-btn {
  position: fixed;
  top: 16px;
  left: 16px;
  font-size: 24px;
  background: rgba(255,255,255,0.1);
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
  z-index: 1010;
}

.side-menu {
  position: fixed;
  top: 0;
  left: 0;
  width: 260px;
  height: 100%;
  background: #020617;
  padding: 20px;
  box-shadow: 10px 0 30px rgba(0,0,0,0.4);
  z-index: 990;
}

.menu-header {
  font-size: 22px;
  font-weight: 800;
  margin-left: 64px;
  margin-bottom: 22px;
  line-height: 48px;
}

.side-menu {
  padding-top: 20px;
}

.menu-item {
  width: 100%;
  text-align: left;
  margin-bottom: 10px;
  background: rgba(255,255,255,0.08);
}
.welcome-title {
  margin-left: 86px;   /* hely a hamburgernek */
  margin-top: 10px;
  margin-bottom: 24px;
  font-size: 24px;
  line-height: 1.2;
}
</style>
</head>
<body>
  <!-- HAMBURGER -->
  <div id="menuBtn" class="menu-btn hidden">☰</div>

  <div id="sideMenu" class="side-menu hidden">
    <div class="menu-header">Idesüss</div>

    <button class="menu-item">🏠 Kezdőképernyő</button>
    <button class="menu-item">👤 Profil</button>
    <button class="menu-item">🌍 Community</button>
    <button class="menu-item">📻 Rádió</button>
    <button class="menu-item">⚙️ Beállítások</button>

    <hr>

    <button class="menu-item">🌐 Nyelv</button>

    <button class="menu-item">🔑 Jelszó</button>

    <hr>

    <button class="menu-item" id="menuLogout">🚪 Kilépés</button>
  </div>

  <div class="wrap">

        <div class="auth-footer">

        </div>

        <div class="error-box" id="loginError"></div>
        <div class="success-box" id="loginSuccess"></div>
      </div>

      <div id="registerView" class="hidden">
        <h2 data-i18n="register">Regisztráció</h2>

        <div class="row" style="margin-bottom:10px;">
          <input id="registerEmail" type="email" data-i18n-placeholder="email" placeholder="Email cím">
          <input id="registerPassword" type="password" data-i18n-placeholder="password" placeholder="Jelszó">
        </div>

        <div class="row" style="margin-bottom:10px;">
          <input id="registerPassword2" type="password" data-i18n-placeholder="passwordAgain" placeholder="Jelszó megerősítése">

        <div class="muted" data-i18n="chooseAvatar">Válassz avatart:</div>

        <div class="consent-row">
          <input id="consentCheckbox" type="checkbox">
          <label for="consentCheckbox">
            Elolvastam és elfogadom a
            <a href="/privacy.html" target="_blank" rel="noopener noreferrer">Privacy Policy</a>
            és a
            <a href="/terms.html" target="_blank" rel="noopener noreferrer">Felhasználási feltételek</a>
            tartalmát.
          </label>
        </div>

        <div class="auth-footer">
          <button id="registerBtn" class="register" data-i18n="register">Regisztráció</button>
          <button id="backFromRegisterBtn" class="secondary" data-i18n="back">Vissza</button>
        </div>

        <div class="error-box" id="registerError"></div>
        <div class="success-box" id="registerSuccess"></div>
      </div>

      <div id="resetView" class="hidden">
        <h2 data-i18n="newPassword">Új jelszó beállítása</h2>

        <div class="row" style="margin-bottom:10px;">
          <input id="resetPassword1" type="password" data-i18n-placeholder="newPassword" placeholder="Új jelszó">
          <input id="resetPassword2" type="password" data-i18n-placeholder="passwordAgain" placeholder="Új jelszó megerősítése">
        </div>

        <div class="auth-footer">
          <button id="resetSaveBtn" class="warning" data-i18n="saveNewPassword">Új jelszó mentése</button>
          <button id="backFromResetBtn" class="secondary" data-i18n="back">Vissza</button>
        </div>

        <div class="error-box" id="resetError"></div>
        <div class="success-box" id="resetSuccess"></div>
      </div>

      <hr style="border:none;height:1px;background:rgba(255,255,255,0.12);margin:18px 0;">

      <div class="muted" id="authInfo">Nincs bejelentkezett user.</div>

      <div class="auth-footer">
        <button id="logoutBtn" class="secondary" data-i18n="logout">Kilépés</button>
      </div>
    </div>

    <div id="profilePanel" class="panel hidden">
      <h2 data-i18n="profile">Profil</h2>

      <div class="profile-preview">
        <div id="profilePreviewAvatar" class="avatar-circle">🙂</div>
        
        
        <div class="auth-footer avatar-actions">
  <button id="chooseAvatarFileBtn" type="button" class="secondary">📁 Galéria</button>
  <button id="takeAvatarPhotoBtn" type="button" class="secondary">📷 Kamera</button>
</div>
<div class="profile-meta">
        </div>
      </div>

      <div class="row" style="margin-bottom:10px;">
        <input id="profileNickname" type="text" data-i18n-placeholder="nickname" placeholder="Nicknév">
          <input id="profileAvatarUrl" type="hidden">
          <input id="avatarFileInput" type="file" accept="image/*" class="hidden">
<input id="avatarCameraInput" type="file" accept="image/*" capture="user" class="hidden">

<div class="auth-footer">
  <button id="chooseAvatarFileBtn" type="button" class="secondary">📁 Galéria</button>
  <button id="takeAvatarPhotoBtn" type="button" class="secondary">📷 Kamera</button>
</div>
      </div>

      <div class="muted" data-i18n="chooseDefaultAvatar">
        Válassz alap avatart, ha nem szeretnél saját képet használni:
      </div>

      <div id="profileAvatarGrid" class="avatar-grid"></div>

      <div class="auth-footer">
        <button id="saveProfileBtn" class="register" data-i18n="saveProfile">Profil mentése</button>
      </div>
    </div>

    <div class="panel">
      <div class="row">
        <input id="newPost" type="text" data-i18n-placeholder="writeSomething" placeholder="Írj valamit..." disabled>
        <button id="sendBtn" disabled data-i18n="send">Küldés</button>
      </div>

    </div>

    <div class="panel">
      <div class="status" id="status"></div>
    </div>

    <div id="posts"></div>
  </div>

  <div id="toast" class="toast"></div>

</body>
</html>
