<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Supabase Test</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: #0f172a;
      color: white;
    }

    .container {
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .card {
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .content {
      opacity: 0.8;
    }
  </style>
</head>
<body>

<div class="container" id="posts"></div>

<script>
  const container = document.getElementById("posts");

  function debug(msg, color = "white") {
    console.log(msg);
    const p = document.createElement("div");
    p.style.color = color;
    p.style.padding = "8px";
    p.style.fontFamily = "monospace";
    p.style.fontSize = "14px";
    p.textContent = msg;
    container.appendChild(p);
  }

  debug("Script elindult", "lime");

  const SUPABASE_URL = "https://nakayuciurazdacgyoxu.supabase.co";
const SUPABASE_KEY = sb_publishable_N22j5vRDgiqKXasUbQT1dQ_KOyq6cfG

  if (!SUPABASE_URL || SUPABASE_URL.includes("IDE_JÖN")) {
    debug("HIBA: nincs kitöltve a SUPABASE_URL", "red");
  }

  if (!SUPABASE_KEY || SUPABASE_KEY.includes("IDE_JÖN")) {
    debug("HIBA: nincs kitöltve a SUPABASE_KEY", "red");
  }

  try {
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    debug("Supabase kliens létrejött", "cyan");

    async function loadPosts() {
      debug("Lekérés indul...", "yellow");

      const { data, error } = await supabaseClient
        .from("posts")
        .select("*");

      if (error) {
        debug("SUPABASE HIBA: " + error.message, "red");
        return;
      }

      debug("Lekért rekordok száma: " + data.length, "lime");

      if (data.length === 0) {
        debug("Nincs adat a posts táblában.", "orange");
        return;
      }

      data.forEach(post => {
        const card = document.createElement("div");
        card.style.background = "rgba(255,255,255,0.08)";
        card.style.borderRadius = "14px";
        card.style.padding = "12px";
        card.style.margin = "10px 0";
        card.innerHTML = `
          <div style="font-weight:700; font-size:18px; margin-bottom:6px;">
            ${post.title || "Nincs cím"}
          </div>
          <div style="opacity:.85;">
            ${post.content || ""}
          </div>
        `;
        container.appendChild(card);
      });
    }

    loadPosts();
  } catch (e) {
    debug("JS HIBA: " + e.message, "red");
  }
</script>

</body>
</html>
