<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Supabase Auth Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: white;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
    }

    .panel {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      flex: 1;
      min-width: 220px;
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 12px 18px;
      border-radius: 12px;
      border: none;
      background: #0d5bd7;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #475569;
    }

    button.register {
      background: #16a34a;
    }

    button.warning {
      background: #7c3aed;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .big-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }

    .muted {
      opacity: 0.8;
      font-size: 14px;
      line-height: 1.45;
    }

    .status {
      font-family: monospace;
      font-size: 14px;
      white-space: pre-line;
      opacity: 0.95;
    }

    .error-box {
      margin-top: 10px;
      color: #fecaca;
      font-size: 14px;
      min-height: 20px;
    }

    .success-box {
      margin-top: 10px;
      color: #bbf7d0;
      font-size: 14px;
      min-height: 20px;
    }

    .consent-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 12px 0 4px;
    }

    .consent-row input[type="checkbox"] {
      margin-top: 3px;
      transform: scale(1.15);
      flex: 0 0 auto;
    }

    .consent-row label {
      font-size: 14px;
      opacity: 0.95;
      line-height: 1.45;
    }

    a {
      color: #93c5fd;
      text-decoration: underline;
    }

    #posts {
      display: grid;
      gap: 16px;
      margin-top: 16px;
    }

    .card {
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .date {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 8px;
    }

    .author {
      font-size: 12px;
      opacity: 0.75;
      margin-bottom: 8px;
    }

    .text {
      font-size: 18px;
      font-weight: 700;
      word-break: break-word;
    }

    .auth-footer {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>/test – auth + consent + posts</h1>

    <div class="panel">
      <div id="authChoiceView">
        <h2>Folytatás</h2>
        <div class="muted">
          Válaszd ki, hogy már van fiókod, vagy most szeretnél regisztrálni.
        </div>

        <div class="big-actions">
          <button id="showLoginBtn">Van már fiókom</button>
          <button id="showRegisterBtn" class="register">Új vagyok itt</button>
        </div>
      </div>

      <div id="loginView" class="hidden">
        <h2>Belépés</h2>

        <div class="row" style="margin-bottom:10px;">
          <input id="loginEmail" type="email" placeholder="Email cím">
          <input id="loginPassword" type="password" placeholder="Jelszó">
        </div>

        <div class="auth-footer">
          <button id="loginBtn">Belépés</button>
          <button id="backFromLoginBtn" class="secondary">Vissza</button>
          <button id="forgotBtn" class="warning">Elfelejtett jelszó</button>
        </div>

        <div class="error-box" id="loginError"></div>
        <div class="success-box" id="loginSuccess"></div>
      </div>

      <div id="registerView" class="hidden">
        <h2>Regisztráció</h2>

        <div class="row" style="margin-bottom:10px;">
          <input id="registerEmail" type="email" placeholder="Email cím">
          <input id="registerPassword" type="password" placeholder="Jelszó">
        </div>

        <div class="row" style="margin-bottom:10px;">
          <input id="registerPassword2" type="password" placeholder="Jelszó megerősítése">
        </div>

        <div class="consent-row">
          <input id="consentCheckbox" type="checkbox">
          <label for="consentCheckbox">
            Elolvastam és elfogadom a
            <a href="/privacy.html" target="_blank" rel="noopener noreferrer">Privacy Policy</a>
            és a
            <a href="/terms.html" target="_blank" rel="noopener noreferrer">Felhasználási feltételek</a>
            tartalmát.
          </label>
        </div>

        <div class="auth-footer">
          <button id="registerBtn" class="register">Regisztráció</button>
          <button id="backFromRegisterBtn" class="secondary">Vissza</button>
        </div>

        <div class="error-box" id="registerError"></div>
        <div class="success-box" id="registerSuccess"></div>
      </div>

      <hr style="border:none;height:1px;background:rgba(255,255,255,0.12);margin:18px 0;">

      <div class="muted" id="authInfo">Nincs bejelentkezett user.</div>
      <div class="auth-footer">
        <button id="logoutBtn" class="secondary">Kilépés</button>
      </div>
    </div>

    <div class="panel">
      <div class="row">
        <input id="newPost" type="text" placeholder="Írj valamit..." disabled>
        <button id="sendBtn" disabled>Küldés</button>
      </div>
      <div class="muted" style="margin-top:10px;">
        Posztolni csak bejelentkezés után lehet.
      </div>
    </div>

    <div class="panel">
      <div class="status" id="status"></div>
    </div>

    <div id="posts"></div>
  </div>

  <script>
