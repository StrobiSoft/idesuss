<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Idesüss Test</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: white;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding-top: 70px;
    }

    .panel {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      flex: 1;
      min-width: 220px;
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
    }

    input[type="hidden"] {
      display: none;
    }

    button {
      padding: 12px 18px;
      border-radius: 12px;
      border: none;
      background: #0d5bd7;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary { background: #475569; }
    button.register { background: #16a34a; }
    button.warning { background: #7c3aed; }

    .hidden { display: none; }

    .auth-footer {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .avatar-circle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.10);
      font-size: 28px;
    }

    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .avatar-btn {
      height: 48px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      font-size: 24px;
      cursor: pointer;
    }

    .avatar-btn.selected {
      border: 2px solid #93c5fd;
    }

    .avatar-actions {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }

    .menu-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 1000;
    }

    .side-menu {
      position: fixed;
      left: 0;
      top: 0;
      width: 260px;
      height: 100%;
      background: #020617;
      padding: 20px;
      z-index: 900;
    }

    .menu-item {
      width: 100%;
      margin-bottom: 10px;
    }

    .welcome-title {
      margin-left: 80px;
    }
  </style>
</head>
