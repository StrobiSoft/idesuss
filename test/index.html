<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Supabase Test</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: #0f172a;
      color: white;
    }

    .container {
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .card {
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .content {
      opacity: 0.8;
    }
  </style>
</head>
<body>

<div class="container" id="posts"></div>

<script>
const container = document.getElementById("posts");

function debug(msg, color = "white") {
  console.log(msg);
  const p = document.createElement("p");
  p.style.color = color;
  p.textContent = msg;
  container.appendChild(p);
}

debug("Script elindult", "lightgreen");

const SUPABASE_URL = "https://nakayuciurazdacgyoxu.supabase.co";
const SUPABASE_KEY = "IDE_A_TE_TELJES_KULCSOD";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

debug("Supabase kliens létrejött", "cyan");

(async () => {
  try {
    debug("Lekérés indul...", "orange");

    const { data, error } = await supabase
      .from("posts")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) {
      debug("SUPABASE HIBA: " + error.message, "red");
      return;
    }

    debug("Lekért rekordok száma: " + data.length, "lightgreen");

    container.innerHTML = "";

    if (!data || data.length === 0) {
      debug("Nincs adat a posts táblában.", "orange");
      return;
    }

    data.forEach(post => {
      const card = document.createElement("div");
      card.style.background = "rgba(255,255,255,0.08)";
      card.style.borderRadius = "14px";
      card.style.padding = "12px";
      card.style.margin = "10px 0";
      card.style.boxShadow = "0 10px 30px rgba(0,0,0,0.25)";

      const date = post.created_at
        ? new Date(post.created_at).toLocaleString("hu-HU")
        : "Nincs dátum";

      card.innerHTML = `
        <div style="font-size:12px; opacity:.7; margin-bottom:8px;">
          ${date}
        </div>
        <div style="font-size:18px; font-weight:700;">
          ${post.text || "Nincs szöveg"}
        </div>
      `;

      container.appendChild(card);
    });
  } catch (err) {
    debug("JS HIBA: " + err.message, "red");
  }
})();
</script>

</body>
</html>
