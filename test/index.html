<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Idesüss Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: white;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
    }

    .panel {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"],
    input[type="url"] {
      flex: 1;
      min-width: 220px;
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 12px 18px;
      border-radius: 12px;
      border: none;
      background: #0d5bd7;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #475569;
    }

    button.register {
      background: #16a34a;
    }

    button.warning {
      background: #7c3aed;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .big-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }

    .muted {
      opacity: 0.8;
      font-size: 14px;
      line-height: 1.45;
    }

    .status {
      font-family: monospace;
      font-size: 14px;
      white-space: pre-line;
      opacity: 0.95;
    }

    .error-box {
      margin-top: 10px;
      color: #fecaca;
      font-size: 14px;
      min-height: 20px;
    }

    .success-box {
      margin-top: 10px;
      color: #bbf7d0;
      font-size: 14px;
      min-height: 20px;
    }
