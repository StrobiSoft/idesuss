<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Idesüss App</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">

    <style>
        :root {
            --bg1: #08111f; --bg2: #0f172a;
            --panel: rgba(255, 255, 255, 0.05);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text: #eef4ff; --muted: #a4b1c8;
            --accent: linear-gradient(135deg, #38bdf8, #0ea5e9);
            --danger: #cf4a4a;
            --safe-top: env(safe-area-inset-top, 0px);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            background: linear-gradient(155deg, var(--bg1), var(--bg2));
            color: var(--text); font-family: -apple-system, system-ui, sans-serif;
            overflow-x: hidden;
        }

        body {
            padding: calc(20px + var(--safe-top)) 15px 40px;
        }

        .app-shell {
            max-width: 760px; margin: 0 auto;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--panel-border);
            border-radius: 32px; padding: 20px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Header */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px;
        }
        .brand h1 { font-size: 1.6rem; margin: 0; font-weight: 800; letter-spacing: -1px; }
        
        .lang-switch {
            background: var(--panel); border-radius: 12px; padding: 4px; display: flex; gap: 4px;
        }
        .lang-btn {
            border: none; background: none; color: var(--muted); padding: 6px 12px;
            border-radius: 8px; font-weight: 700; font-size: 0.75rem; cursor: pointer;
        }
        .lang-btn.active { background: var(--accent); color: white; }

        /* Kártyák */
        .card {
            background: var(--panel); border: 1px solid var(--panel-border);
            border-radius: 24px; padding: 20px; margin-bottom: 16px;
            width: 100%; overflow: hidden; /* iPhone elcsúszás ellen */
        }
        .card h2 { font-size: 1.1rem; margin: 0 0 15px; opacity: 0.9; }

        textarea {
            width: 100%; min-height: 100px; background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
            color: white; padding: 15px; font-size: 1rem; outline: none; resize: none;
        }

        .btn-play {
            width: 100%; padding: 18px; margin-top: 15px; border: none;
            border-radius: 16px; background: var(--accent); color: white;
            font-weight: 800; font-size: 1.1rem; cursor: pointer;
        }

        /* DINAMIKUS LEJÁTSZÓ */
        .player-shell {
            width: 100%; aspect-ratio: 16/9; background: #000;
            border-radius: 20px; overflow: hidden; position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .player-shell.portrait {
            aspect-ratio: 9/16; max-width: 340px; margin: 0 auto;
        }
        iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:none; }

        /* Előzmények listája */
        .history-list { margin-top: 10px; }
        .history-item {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.03); padding: 12px 15px;
            border-radius: 14px; margin-bottom: 8px; font-size: 0.85rem;
        }
        .history-url { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; cursor: pointer; color: var(--accent); }
        .btn-del { background: none; border: none; color: var(--danger); font-weight: 800; padding-left: 10px; }

        .status { text-align: center; margin-top: 10px; font-size: 0.8rem; color: var(--muted); }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="header">
        <div class="brand"><h1>Idesüss</h1></div>
        <div class="lang-switch">
            <button class="lang-btn active" id="hu-btn" onclick="toggleLang('hu')">HU</button>
            <button class="lang-btn" id="en-btn" onclick="toggleLang('en')">EN</button>
        </div>
    </header>

    <div class="card">
        <h2 id="lbl-input">Videó link</h2>
        <textarea id="videoURL" placeholder="Illessz be egy linket..."></textarea>
        <button class="btn-play" id="lbl-btn" onclick="startApp()">Indítás</button>
        <div id="status" class="status"></div>
    </div>

    <div id="playerCard" class="card" style="display:none;">
        <h2 id="lbl-player">Lejátszó</h2>
        <div id="pShell" class="player-shell">
            <div id="pTarget"></div>
        </div>
    </div>

    <div class="card">
        <h2 id="lbl-history">Előzmények</h2>
        <div id="historyBox" class="history-list"></div>
        <button onclick="clearAllHistory()" style="background:none; border:none; color:var(--danger); font-size:0.8rem; margin-top:10px; cursor:pointer; width:100%;">Törlés</button>
    </div>
</div>

<script>
    function startApp() {
    let url = document.getElementById('videoURL').value.trim();
    const target = document.getElementById('pTarget');
    const shell = document.getElementById('pShell');
    const status = document.getElementById('status');
    
    if(!url) return;
    status.innerText = langData[currentLang].loading;

    let embedUrl = "";
    let isPortrait = false;

    // --- AGRESSZÍV LINKELEMZŐ ---
    try {
        // 1. YouTube & Shorts
        if (url.includes("youtube.com") || url.includes("youtu.be")) {
            let vId = url.includes("shorts/") ? url.split("shorts/")[1].split(/[?&]/)[0] : 
                     (url.includes("v=") ? url.split("v=")[1].split("&")[0] : url.split("/").pop().split(/[?&]/)[0]);
            embedUrl = `https://www.youtube-nocookie.com/embed/${vId}?autoplay=1`;
            if(url.includes("shorts/")) isPortrait = true;
        }
        
        // 2. TikTok (Mobil link javítás: vm.tiktok.com)
        else if (url.includes("tiktok.com")) {
            isPortrait = true;
            // Ha a linkben benne van a /video/, kinyerjük az ID-t
            if (url.includes("/video/")) {
                const vId = url.split("/video/")[1].split(/[?&]/)[0];
                embedUrl = `https://www.tiktok.com/embed/v2/${vId}`;
            } else {
                // Ha rövidített mobil link, akkor sajnos a böngészőben nem mindig beágyazható
                // Ilyenkor megpróbáljuk a teljes URL-t embeddé alakítani
                embedUrl = `https://www.tiktok.com/embed/${url.split('/').pop().split('?')[0]}`;
            }
        }
        
        // 3. Facebook / Reels (share/v/ és mibextid javítás)
        else if (url.includes("facebook.com") || url.includes("fb.watch") || url.includes("fb.com")) {
            // A képen látható "share/v/" linket átalakítjuk a plugin számára ehető formátumra
            let cleanFb = url.split(/[?&]mibextid/)[0];
            cleanFb = cleanFb.split(/[?&]share/)[0]; // Levágjuk a share paramétert is
            
            embedUrl = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(cleanFb)}&show_text=0&autoplay=1`;
            if(url.includes("reels") || url.includes("share/v/")) isPortrait = true;
        }

        if(embedUrl) {
            document.getElementById('playerCard').style.display = "block";
            shell.className = isPortrait ? "player-shell portrait" : "player-shell";
            
            // Itt a legfontosabb: a "sandbox" attribútum segít iPhone-on kikerülni bizonyos blokkolásokat
            target.innerHTML = `<iframe 
                src="${embedUrl}" 
                allow="autoplay; encrypted-media; fullscreen" 
                allowfullscreen 
                style="width:100%; height:100%;"
                frameborder="0">
            </iframe>`;
            
            status.innerText = "";
            saveToHistory(url);
            setTimeout(() => { document.getElementById('playerCard').scrollIntoView({behavior: 'smooth'}); }, 300);
        } else {
            status.innerText = langData[currentLang].error;
        }
    } catch(e) { 
        status.innerText = langData[currentLang].error; 
    }
}

</script>

</body>
</html>
