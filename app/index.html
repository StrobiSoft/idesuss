<!DOCTYPE html>
<html lang="hu">
<head>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="shortcut icon" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <link rel="icon" href="/favicon.png">
    <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Idesüss™</title>

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0f172a" />

    <style>
        :root {
            --bg-1: #020617;
            --bg-2: #0f172a;
            --card: rgba(15, 23, 42, 0.72);
            --line: rgba(255, 255, 255, 0.10);
            --line-soft: rgba(255, 255, 255, 0.06);
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #0ea5e9;
            --accent-2: #38bdf8;
            --ok: #22c55e;
            --danger: #f87171;
            --warn: #fbbf24;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            --radius-xl: 28px;
            --radius-lg: 20px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background:
                radial-gradient(circle at top, rgba(14,165,233,0.14), transparent 35%),
                linear-gradient(180deg, var(--bg-2), var(--bg-1));
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            padding:
                max(16px, env(safe-area-inset-top))
                16px
                max(24px, env(safe-area-inset-bottom))
                16px;
            display: flex;
            justify-content: center;
        }

        .app {
            width: 100%;
            max-width: 460px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 14px;
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .brand-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 0.2px;
        }

        .tm {
            font-size: 11px;
            vertical-align: super;
            margin-left: 2px;
            opacity: 0.9;
        }

        .brand-sub {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.18em;
            font-weight: 700;
            text-transform: uppercase;
        }

        .top-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .install-btn {
            border: 1px solid var(--line);
            background: rgba(255,255,255,0.06);
            color: #fff;
            border-radius: 14px;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            white-space: nowrap;
            backdrop-filter: blur(12px);
        }

        .lang-area {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 8px 10px;
            backdrop-filter: blur(12px);
        }

        .lang-icon {
            font-size: 16px;
            line-height: 1;
        }

        .lang-select {
            border: none;
            background: transparent;
            color: #fff;
            font-size: 14px;
            font-weight: 800;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            min-width: 54px;
        }

        .lang-select option {
            color: #000;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius-xl);
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
        }

        .hero-card {
            padding: 18px;
            margin-bottom: 14px;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .mini-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--line-soft);
            border-radius: 18px;
            padding: 14px;
        }

        .mini-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 8px;
        }

        .counter-value {
            font-size: 24px;
            font-weight: 800;
        }

        .counter-note {
            margin-top: 6px;
            font-size: 12px;
            color: var(--muted);
            line-height: 1.35;
        }

        .lang-note {
            font-size: 16px;
            color: var(--text);
            font-weight: 800;
        }

        .lang-subnote {
            margin-top: 6px;
            font-size: 12px;
            color: var(--muted);
            line-height: 1.35;
        }

        .input-card {
            padding: 18px;
            margin-bottom: 14px;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            resize: vertical;
            background: rgba(0, 0, 0, 0.20);
            border: 1px solid var(--line);
            border-radius: 18px;
            color: #fff;
            padding: 14px 14px;
            font-size: 16px;
            line-height: 1.45;
            outline: none;
        }

        textarea::placeholder {
            color: #94a3b8;
        }

        textarea:focus {
            border-color: rgba(56,189,248,0.55);
            box-shadow: 0 0 0 4px rgba(14,165,233,0.12);
        }

        .action-row {
            display: flex;
            gap: 12px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .play-btn {
            flex: 1 1 100%;
            border: none;
            border-radius: 20px;
            padding: 18px 16px;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            font-size: 18px;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 12px 30px rgba(14,165,233,0.28);
        }

        .play-btn:active,
        .secondary-btn:active,
        .history-link:active,
        .history-share:active,
        .back-btn:active,
        .clear-btn:active,
        .install-btn:active,
        .footer-link:active {
            transform: scale(0.985);
        }

        .play-icon {
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
        }

        .play-icon svg {
            width: 24px;
            height: 24px;
            display: block;
        }

        .secondary-btn {
            border: 1px solid var(--line);
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-radius: 20px;
            padding: 0 16px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            min-width: 88px;
            height: 52px;
            flex: 1 1 calc(33.333% - 8px);
        }

        .status {
            min-height: 20px;
            margin-top: 14px;
            font-size: 14px;
            line-height: 1.45;
            color: var(--accent-2);
            text-align: center;
        }

        .status.error {
            color: var(--danger);
        }

        .status.ok {
            color: var(--ok);
        }

        .status.warn {
            color: var(--warn);
        }

        .player-card {
            padding: 14px;
            margin-bottom: 14px;
            display: none;
        }

        .player-frame {
            width: 100%;
            aspect-ratio: 9 / 16;
            border: none;
            border-radius: 18px;
            background: #000;
            display: block;
        }

        .back-btn {
            width: 100%;
            margin-top: 14px;
            border: none;
            border-radius: 18px;
            padding: 16px;
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
        }
